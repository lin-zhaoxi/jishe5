<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>马头墙关键词词云 · 典雅版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3-cloud/1.2.5/d3.layout.cloud.min.js"></script>
    <style>
      :root {
        --paper-bg: #F8F6F0;
        --title-color: #2b333e;
        --subtitle-color: #8c939d;
        --line-color: #6C7A89;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background-color: var(--paper-bg);
        font-family: Georgia, "KaiTi", "楷体", "华文楷体", STKaiti, serif;
      }

      .wrap {
        width: 100%;
        height: 100%;
        padding: 24px 32px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
      }

      .header {
        margin-bottom: 20px;
        position: relative;
        padding-left: 14px;
      }

      .header::before {
        content: "";
        position: absolute;
        left: 0;
        top: 4px;
        bottom: 2px;
        width: 4px;
        background: var(--line-color);
        border-radius: 2px;
      }

      .title {
        font-size: 22px;
        font-weight: bold;
        letter-spacing: 2px;
        color: var(--title-color);
        margin: 0 0 4px 0;
      }

      .subtitle {
        font-family: "Helvetica Neue", Arial, sans-serif;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 1.5px;
        color: var(--subtitle-color);
        text-transform: uppercase;
      }

      #cloud {
        width: 100%;
        flex: 1;
        min-height: 0;
        /* 给词云容器增加质感边框和阴影 */
        border: 1px solid rgba(214, 203, 184, 0.6);
        border-radius: 12px;
        background: rgba(253, 251, 246, 0.85);
        box-shadow: 0 8px 24px -8px rgba(0, 0, 0, 0.05);
        position: relative;
      }

      svg {
        width: 100%;
        height: 100%;
        display: block;
      }

      /* 自定义 Tooltip 样式 */
      .custom-tooltip {
        position: absolute;
        text-align: left;
        padding: 10px 14px;
        font-size: 13px;
        font-family: "Segoe UI", "PingFang SC", sans-serif;
        background: rgba(255, 255, 255, 0.95);
        border: 1px solid rgba(220, 210, 195, 0.9);
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        border-radius: 8px;
        pointer-events: none;
        opacity: 0;
        z-index: 100;
        color: #4A4638;
        line-height: 1.6;
        backdrop-filter: blur(4px);
        transition: opacity 0.2s ease;
      }

      .custom-tooltip .word-title {
        font-size: 15px;
        font-weight: bold;
        color: #222;
        margin-bottom: 4px;
        border-bottom: 1px dashed #DDD;
        padding-bottom: 2px;
      }

      .custom-tooltip span {
        font-weight: 600;
        color: #C97E5A;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <div class="title">马头墙 · 关键词词云图（图表二）</div>
        <div class="subtitle">Keyword Cloud of Ma-Tau Wall Architecture</div>
      </div>
      <div id="cloud"></div>
    </div>

    <div id="tooltip" class="custom-tooltip"></div>

    <script>
      (function () {
        const words = [
          { text: "防火", value: 16, cat: "功能需求" },
          { text: "阶梯状", value: 15, cat: "类型" },
          { text: "徽商", value: 15, cat: "文化寓意" },
          { text: "印斗式", value: 14, cat: "类型" },
          { text: "鹊尾式", value: 14, cat: "类型" },
          { text: "读书做官", value: 14, cat: "文化寓意" },
          { text: "坐吻式", value: 13, cat: "类型" },
          { text: "朝笏式", value: 12, cat: "类型" },
          { text: "小青砖", value: 12, cat: "结构做法" },
          { text: "白灰粉刷", value: 12, cat: "结构做法" },
          { text: "青瓦", value: 11, cat: "结构做法" },
          { text: "粉墙黛瓦", value: 11, cat: "结构做法" },
          { text: "五岳朝天", value: 10, cat: "类型" },
          { text: "座头", value: 10, cat: "结构做法" },
          { text: "三叠式", value: 9, cat: "类型" },
          { text: "程朱理学", value: 9, cat: "文化寓意" },
          { text: "两叠式", value: 8, cat: "类型" },
          { text: "防风", value: 8, cat: "功能需求" },
          { text: "拔檐", value: 8, cat: "结构做法" },
          { text: "博风板", value: 8, cat: "结构做法" },
          { text: "天人合一", value: 8, cat: "文化寓意" },
          { text: "吉祥寓意", value: 8, cat: "文化寓意" },
          { text: "宗族", value: 7, cat: "文化寓意" },
          { text: "风水", value: 7, cat: "文化寓意" },
          { text: "四水归堂", value: 6, cat: "文化寓意" },
          { text: "审美价值", value: 6, cat: "文化寓意" },
          { text: "马到成功", value: 5, cat: "文化寓意" },
          { text: "贾而好儒", value: 5, cat: "文化寓意" },
          { text: "叠涩", value: 5, cat: "结构做法" },
          { text: "硬山顶", value: 5, cat: "结构做法" },
          { text: "遮阳", value: 4, cat: "功能需求" },
          { text: "中庸之道", value: 4, cat: "文化寓意" },
        ];

        // 徽派传统色系定制
        function colorByCat(cat) {
          if (cat === "功能需求") return "#2F5A50"; // 黛绿
          if (cat === "类型") return "#A84638"; // 砖红
          if (cat === "结构做法") return "#4A5559"; // 墨灰
          return "#C48B47"; // 秋香色/琉璃黄 (文化寓意)
        }

        const tooltip = d3.select("#tooltip");

        function renderCloud() {
          const cloud = document.getElementById("cloud");
          const rect = cloud.getBoundingClientRect();
          const width = Math.max(300, Math.floor(rect.width));
          const height = Math.max(300, Math.floor(rect.height));
          
          // 每次重绘前清空容器
          cloud.innerHTML = "";

          const svg = d3
            .select("#cloud")
            .append("svg")
            .attr("viewBox", `0 0 ${width} ${height}`);

          const g = svg
            .append("g")
            .attr("transform", `translate(${width / 2},${height / 2})`);

          // 动态计算基础字体大小，防止屏幕过小导致溢出
          const baseScale = Math.min(width, height) / 400;

          const cloudWords = words.map((d) => ({
            text: d.text,
            size: (12 + d.value * 2.5) * baseScale, // 按比例缩放字体
            cat: d.cat,
            value: d.value,
          }));

          const layout = d3.layout
            .cloud()
            .size([width, height])
            .words(cloudWords)
            .padding(6) // 增加词间距，让呼吸感更强
            // 降低竖排文字的概率，中文横排阅读体验更好
            .rotate(() => (Math.random() > 0.9 ? 90 : 0)) 
            .font("KaiTi")
            .fontSize((d) => d.size)
            .on("end", (outWords) => {
              const textNodes = g
                .selectAll("text")
                .data(outWords)
                .enter()
                .append("text")
                .style("font-size", (d) => `${d.size}px`)
                .style("fill", (d) => colorByCat(d.cat))
                .style("opacity", 0) // 初始全透明，用于实现入场动画
                .style("font-weight", (d) => (d.value >= 12 ? 700 : 500))
                // 添加细微的文字阴影，产生凸版印刷的效果
                .style("text-shadow", "1px 1px 0px rgba(255,255,255,0.5)")
                .attr("text-anchor", "middle")
                .attr("transform", (d) => `translate(${d.x},${d.y}) rotate(${d.rotate})`)
                .text((d) => d.text)
                .style("cursor", "pointer");

              // 入场渐显动画
              textNodes.transition()
                .duration(800)
                .delay((d, i) => i * 15) // 瀑布流依次显现
                .style("opacity", 0.95);

              // 交互事件绑定 (Hover)
              textNodes
                .on("mouseover", function (event, d) {
                  // 1. 同类别高亮平滑过渡
                  g.selectAll("text")
                   .transition()
                   .duration(300)
                   .style("opacity", (x) => (x.cat === d.cat ? 1 : 0.15))
                   .style("filter", (x) => (x.cat === d.cat ? "drop-shadow(0px 2px 4px rgba(0,0,0,0.15))" : "none"));

                  // 2. 显示自定义 Tooltip
                  tooltip.html(`
                    <div class="word-title">${d.text}</div>
                    类别：${d.cat}<br/>
                    频次：<span>${d.value}</span>
                  `);
                  tooltip.style("opacity", 1);
                })
                .on("mousemove", function (event) {
                  // 让 Tooltip 跟随鼠标
                  tooltip
                    .style("left", (event.pageX + 15) + "px")
                    .style("top", (event.pageY - 15) + "px");
                })
                .on("mouseout", function () {
                  // 1. 恢复所有词汇透明度
                  g.selectAll("text")
                   .transition()
                   .duration(400)
                   .style("opacity", 0.95)
                   .style("filter", "none");

                  // 2. 隐藏 Tooltip
                  tooltip.style("opacity", 0);
                });
            });

          layout.start();
        }

        // 初始化并添加防抖的 resize 监听
        renderCloud();
        
        let resizeTimer;
        window.addEventListener("resize", () => {
          clearTimeout(resizeTimer);
          resizeTimer = setTimeout(renderCloud, 200);
        });
      })();
    </script>
  </body>
</html>
