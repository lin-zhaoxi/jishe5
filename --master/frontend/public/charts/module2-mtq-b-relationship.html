<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>马头墙关系图 · 终极质感版</title>
    <script src="https://fastly.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
      :root {
        --paper-bg: #F7F5EE;
        --title-color: #2b333e;
        --subtitle-color: #8c939d;
        --line-color: #6C7A89;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background-color: var(--paper-bg);
        /* 核心升级 1：纯 CSS 实现的宣纸微噪点肌理 */
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
        font-family: Georgia, "KaiTi", "楷体", "华文楷体", STKaiti, serif;
      }

      .wrap {
        width: 100%;
        height: 100%;
        padding: 24px 32px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
      }

      /* 核心升级 2：学术感排版 */
      .header {
        margin-bottom: 20px;
        position: relative;
        padding-left: 14px;
      }

      .header::before {
        content: "";
        position: absolute;
        left: 0;
        top: 4px;
        bottom: 2px;
        width: 4px;
        background: var(--line-color);
        border-radius: 2px;
      }

      .title {
        font-size: 22px;
        font-weight: bold;
        letter-spacing: 2px;
        color: var(--title-color);
        margin: 0 0 4px 0;
      }

      .subtitle {
        font-family: "Helvetica Neue", Arial, sans-serif;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 1.5px;
        color: var(--subtitle-color);
        text-transform: uppercase;
      }

      #chart {
        flex: 1;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <div class="title">马头墙 · 关键词关系图（图表三）</div>
        <div class="subtitle">Knowledge Graph of Ma-Tau Wall Architecture</div>
      </div>
      <div id="chart"></div>
    </div>

    <script>
      (function () {
        const dom = document.getElementById("chart");
        // 开启高分屏支持，提升抗锯齿效果
        const chart = echarts.init(dom, null, { renderer: "canvas", devicePixelRatio: window.devicePixelRatio || 2 });

        // 色盘微调：加深了一点点饱和度，使其在复杂大屏中压得住阵脚
        const colors = {
          col1: "#26363E", // 深黛色
          col2: "#A34343", // 浓胭脂
          col3: "#566C7A", // 苍青
          col4: "#B58A52", // 古铜/秋香
          col5: "#4E6E5D", // 墨绿
          edge: "rgba(150, 145, 135, 0.28)", // 静态连线
          edgeHi: "#C95B47", // 高亮连线：朱砂红
        };

        // 数据2：四层结构（影响因素 -> 核心细分 -> 特征类型 -> 构造做法）
        const col1 = [
          { id: "f_env", name: "自然环境" },
          { id: "f_life", name: "生活需求" },
          { id: "f_tech", name: "建筑技术" },
          { id: "f_culture", name: "地域文化" },
        ];

        const col2 = [
          { id: "c_mountain", name: "山地地形", freq: 12 },
          { id: "c_rain", name: "多雨潮湿", freq: 11 },
          { id: "c_timber", name: "木材资源", freq: 10 },
          { id: "c_fire", name: "防火需求", freq: 13 },
          { id: "c_windsun", name: "防风遮阳", freq: 10 },
          { id: "c_hardroof", name: "硬山顶普及", freq: 11 },
          { id: "c_brickprod", name: "砖材产能提升", freq: 12 },
          { id: "c_clan", name: "宗族观念", freq: 10 },
          { id: "c_huishang", name: "徽商经济与崇文重教", freq: 12 },
          { id: "c_aesthetic", name: "美学特征", freq: 9 },
        ];

        const col3 = [
          { id: "t_step", name: "阶梯状跌落（风火墙面）", freq: 14 },
          { id: "t_blackwhite", name: "粉墙黛瓦", freq: 12 },
          { id: "t_wuyue", name: "五岳朝天", freq: 11 },
          { id: "t_zuotou", name: "座头装饰（印斗/朝笏/坐吻/鹊尾）", freq: 11 },
          { id: "t_ridge", name: "墙脊形态（水平带翘角/圆弧）", freq: 10 },
          { id: "t_combo", name: "组合式韵律轮廓", freq: 12 },
        ];

        const col4 = [
          { id: "m_brick", name: "青砖实心砌筑", freq: 12 },
          { id: "m_white", name: "白灰粉刷墙面", freq: 11 },
          { id: "m_eave", name: "三线排檐砖与小青瓦覆顶", freq: 11 },
          { id: "m_stepdrop", name: "阶梯状逐层跌落", freq: 13 },
          { id: "m_zuotou", name: "博风板与座头安装", freq: 10 },
          { id: "m_ridge", name: "墙脊水平带翘角/圆弧面收边", freq: 10 },
          { id: "m_scale", name: "墙身尺度按进深与叠数比例控制", freq: 12 },
        ];

        const links = [
          // 第一层 -> 第二层
          ["f_env", "c_mountain"], ["f_env", "c_rain"], ["f_env", "c_timber"],
          ["f_life", "c_fire"], ["f_life", "c_windsun"],
          ["f_tech", "c_hardroof"], ["f_tech", "c_brickprod"],
          ["f_culture", "c_clan"], ["f_culture", "c_huishang"], ["f_culture", "c_aesthetic"],

          // 第二层 -> 第三层
          ["c_mountain", "t_step"], ["c_mountain", "t_combo"],
          ["c_rain", "t_blackwhite"],
          ["c_timber", "t_step"],
          ["c_fire", "t_step"],
          ["c_windsun", "t_step"],
          ["c_hardroof", "t_step"], ["c_hardroof", "t_wuyue"], ["c_hardroof", "t_combo"],
          ["c_brickprod", "t_step"], ["c_brickprod", "t_wuyue"], ["c_brickprod", "t_ridge"], ["c_brickprod", "t_combo"],
          ["c_clan", "t_wuyue"], ["c_clan", "t_zuotou"],
          ["c_huishang", "t_wuyue"], ["c_huishang", "t_zuotou"], ["c_huishang", "t_blackwhite"], ["c_huishang", "t_ridge"],
          ["c_aesthetic", "t_combo"], ["c_aesthetic", "t_blackwhite"],

          // 第三层 -> 第四层
          ["t_step", "m_brick"], ["t_step", "m_stepdrop"], ["t_step", "m_scale"],
          ["t_blackwhite", "m_white"], ["t_blackwhite", "m_eave"],
          ["t_wuyue", "m_stepdrop"], ["t_wuyue", "m_scale"],
          ["t_zuotou", "m_zuotou"],
          ["t_ridge", "m_eave"], ["t_ridge", "m_ridge"],
          ["t_combo", "m_stepdrop"], ["t_combo", "m_scale"],
        ].map(([source, target]) => ({ source, target, value: 1 }));

        function layoutColumn(items, x, containerH, symbol, color, labelPos, fixedSize) {
          const out = [];
          const n = items.length;
          // 留出上下边距，计算步长
          const step = Math.min(45, (containerH * 0.9) / Math.max(n - 1, 1)); 
          const totalHeight = (n - 1) * step;
          const startY = (containerH - totalHeight) / 2;

          items.forEach((it, idx) => {
            const nodeSize = it.freq ? fixedSize + (it.freq / 16) * 5 : fixedSize;

            out.push({
              id: it.id,
              name: it.name,
              x,
              y: startY + idx * step,
              value: it.freq,
              symbol,
              symbolSize: nodeSize,
              itemStyle: { 
                color, 
                opacity: 0.95,
                borderColor: '#F7F5EE', // 核心升级 4：强化白边，像棋子落在纸上
                borderWidth: 2,
                shadowBlur: 10,
                shadowOffsetY: 4,
                shadowColor: 'rgba(0, 0, 0, 0.12)' 
              },
              label: {
                show: true,
                position: labelPos,
                color: "#2B333E",
                fontSize: 12.5,
                fontWeight: 600,
                distance: 10, 
                fontFamily: "Georgia, 'KaiTi', '楷体', serif"
              },
            });
          });
          return out;
        }

        function buildOption() {
          const w = chart.getWidth();
          const h = chart.getHeight();
          const activeHeight = h; 

          const x1 = w * 0.08;
          const x2 = w * 0.34;
          const x3 = w * 0.60;
          const x4 = w * 0.88;

          const nodes = [
            ...layoutColumn(col1, x1, activeHeight, "roundRect", colors.col1, "left", 18),
            ...layoutColumn(col2, x2, activeHeight, "circle", colors.col2, "right", 12),
            ...layoutColumn(col3, x3, activeHeight, "roundRect", colors.col3, "right", 15),
            ...layoutColumn(col4, x4, activeHeight, "roundRect", colors.col4, "right", 13),
          ];

          return {
            animationDurationUpdate: 1200, // 更平滑的动画过渡
            animationEasingUpdate: 'quinticInOut',
            backgroundColor: "transparent",
            tooltip: {
              show: false,
            },
            series: [
              {
                type: "graph",
                layout: "none",
                roam: false,
                draggable: false,
                edgeSymbol: ["none", "none"],
                lineStyle: {
                  width: 1.5,
                  color: colors.edge,
                  opacity: 0.9,
                  curveness: 0.35, // 核心升级 3：更加柔和流畅的水波纹曲率
                },
                emphasis: {
                  focus: "adjacency",
                  lineStyle: { 
                    width: 3.5, 
                    color: colors.edgeHi, 
                    opacity: 0.9,
                    shadowBlur: 12,
                    shadowColor: "rgba(201, 91, 71, 0.4)" // 连线发光特效
                  },
                  itemStyle: {
                     shadowBlur: 20,
                     shadowOffsetY: 6,
                     shadowColor: 'rgba(0,0,0,0.25)'
                  },
                  label: { show: true, color: "#111", fontWeight: 900, textShadowColor: '#fff', textShadowBlur: 4 },
                },
                blur: {
                  itemStyle: { opacity: 0.2 },
                  lineStyle: { opacity: 0.05 }
                },
                label: { show: true },
                data: nodes,
                links,
              },
            ],
          };
        }

        function render() {
          chart.clear(); 
          chart.setOption(buildOption(), true);
        }

        // 初始渲染
        setTimeout(render, 100); 

        // 监听窗口大小变化
        let resizeTimer;
        window.addEventListener("resize", () => {
          clearTimeout(resizeTimer);
          resizeTimer = setTimeout(() => {
            chart.resize();
            render();
          }, 200);
        });
      })();
    </script>
  </body>
</html>
