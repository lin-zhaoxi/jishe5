<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>天井关键词词云 · 图C</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3-cloud/1.2.5/d3.layout.cloud.min.js"></script>
    <style>
      :root {
        --paper-bg: #F8F6F0;
        --title-color: #2b333e;
        --subtitle-color: #8c939d;
        --line-color: #6C7A89;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background-color: var(--paper-bg);
        font-family: Georgia, "KaiTi", "楷体", "华文楷体", STKaiti, serif;
      }

      .wrap {
        width: 100%;
        height: 100%;
        padding: 24px 32px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
      }

      .header {
        margin-bottom: 20px;
        position: relative;
        padding-left: 14px;
      }

      .header::before {
        content: "";
        position: absolute;
        left: 0;
        top: 4px;
        bottom: 2px;
        width: 4px;
        background: var(--line-color);
        border-radius: 2px;
      }

      .title {
        font-size: 22px;
        font-weight: bold;
        letter-spacing: 2px;
        color: var(--title-color);
        margin: 0 0 4px 0;
      }

      .subtitle {
        font-family: "Helvetica Neue", Arial, sans-serif;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 1.5px;
        color: var(--subtitle-color);
        text-transform: uppercase;
      }

      #cloud {
        width: 100%;
        flex: 1;
        min-height: 0;
        border: 1px solid rgba(214, 203, 184, 0.6);
        border-radius: 12px;
        background: rgba(253, 251, 246, 0.85);
        box-shadow: 0 8px 24px -8px rgba(0, 0, 0, 0.05);
        position: relative;
      }

      svg {
        width: 100%;
        height: 100%;
        display: block;
      }

      .custom-tooltip {
        position: absolute;
        text-align: left;
        padding: 10px 14px;
        font-size: 13px;
        font-family: "Segoe UI", "PingFang SC", sans-serif;
        background: rgba(255, 255, 255, 0.95);
        border: 1px solid rgba(220, 210, 195, 0.9);
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        border-radius: 8px;
        pointer-events: none;
        opacity: 0;
        z-index: 100;
        color: #4A4638;
        line-height: 1.6;
        backdrop-filter: blur(4px);
        transition: opacity 0.2s ease;
      }

      .custom-tooltip .word-title {
        font-size: 15px;
        font-weight: bold;
        color: #222;
        margin-bottom: 4px;
        border-bottom: 1px dashed #DDD;
        padding-bottom: 2px;
      }

      .custom-tooltip span {
        font-weight: 600;
        color: #4A6B7A;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <div class="title">天井 · 关键词词云图（图表二）</div>
        <div class="subtitle">Keyword Cloud of Huizhou Courtyard Architecture</div>
      </div>
      <div id="cloud"></div>
    </div>

    <div id="tooltip" class="custom-tooltip"></div>

    <script>
      (function () {
        // 数据来源：模块二数据收集（天井）2.1.3（频率为文献出现次数，共18篇）
        const words = [
          // 功能需求
          { text: "通风",     value: 17, cat: "功能需求" },
          { text: "采光",     value: 16, cat: "功能需求" },
          { text: "遮阳",     value: 8,  cat: "功能需求" },
          { text: "排水",     value: 7,  cat: "功能需求" },
          { text: "防火",     value: 5,  cat: "功能需求" },
          { text: "调节微气候", value: 5, cat: "功能需求" },
          { text: "热环境",   value: 4,  cat: "功能需求" },
          { text: "自然通风", value: 4,  cat: "功能需求" },
          { text: "节能",     value: 3,  cat: "功能需求" },
          // 类型
          { text: "一字型天井", value: 4, cat: "类型" },
          { text: "回字型天井", value: 4, cat: "类型" },
          { text: "H字型天井", value: 4, cat: "类型" },
          { text: "日字型天井", value: 3, cat: "类型" },
          { text: "凹字型天井", value: 3, cat: "类型" },
          // 结构做法
          { text: "四水归堂", value: 15, cat: "结构做法" },
          { text: "热压通风", value: 7,  cat: "结构做法" },
          { text: "马头墙",   value: 7,  cat: "结构做法" },
          { text: "烟囱效应", value: 5,  cat: "结构做法" },
          { text: "木雕",     value: 7,  cat: "结构做法" },
          { text: "石雕",     value: 4,  cat: "结构做法" },
          { text: "砖雕",     value: 3,  cat: "结构做法" },
          { text: "过亭",     value: 3,  cat: "结构做法" },
          { text: "蓄水池",   value: 3,  cat: "结构做法" },
          { text: "穿堂风",   value: 3,  cat: "结构做法" },
          { text: "风压通风", value: 3,  cat: "结构做法" },
          // 文化寓意
          { text: "天人合一", value: 15, cat: "文化寓意" },
          { text: "风水",     value: 14, cat: "文化寓意" },
          { text: "徽商",     value: 13, cat: "文化寓意" },
          { text: "聚财",     value: 11, cat: "文化寓意" },
          { text: "肥水不流外人田", value: 7, cat: "文化寓意" },
          { text: "宗法礼制", value: 4,  cat: "文化寓意" },
          { text: "借景",     value: 4,  cat: "文化寓意" },
          { text: "虚实相生", value: 3,  cat: "文化寓意" },
          { text: "贾而好儒", value: 3,  cat: "文化寓意" },
          { text: "顶天立地", value: 3,  cat: "文化寓意" },
        ];

        function colorByCat(cat) {
          if (cat === "功能需求") return "#2F5A50";
          if (cat === "类型")     return "#7A5C3A";
          if (cat === "结构做法") return "#4A6B7A";
          return "#8B6A3A"; // 文化寓意
        }

        const tooltip = d3.select("#tooltip");

        function renderCloud() {
          const cloud = document.getElementById("cloud");
          const rect = cloud.getBoundingClientRect();
          const width = Math.max(300, Math.floor(rect.width));
          const height = Math.max(300, Math.floor(rect.height));

          cloud.innerHTML = "";

          const svg = d3.select("#cloud").append("svg").attr("viewBox", `0 0 ${width} ${height}`);
          const g = svg.append("g").attr("transform", `translate(${width / 2},${height / 2})`);

          const baseScale = Math.min(width, height) / 400;
          const maxValue = Math.max(...words.map((w) => w.value || 0), 1);
          const valueScale = 17 / maxValue;
          const cloudWords = words.map((d) => ({
            text: d.text,
            size: (12 + d.value * 2.5 * valueScale) * baseScale,
            cat: d.cat,
            value: d.value,
          }));

          const layout = d3.layout
            .cloud()
            .size([width, height])
            .words(cloudWords)
            .padding(6)
            .rotate(() => (Math.random() > 0.9 ? 90 : 0))
            .font("KaiTi")
            .fontSize((d) => d.size)
            .on("end", (outWords) => {
              const textNodes = g
                .selectAll("text")
                .data(outWords)
                .enter()
                .append("text")
                .style("font-size", (d) => `${d.size}px`)
                .style("fill", (d) => colorByCat(d.cat))
                .style("opacity", 0)
                .style("font-weight", (d) => ((d.value * valueScale) >= 12 ? 700 : 500))
                .style("text-shadow", "1px 1px 0px rgba(255,255,255,0.5)")
                .attr("text-anchor", "middle")
                .attr("transform", (d) => `translate(${d.x},${d.y}) rotate(${d.rotate})`)
                .text((d) => d.text)
                .style("cursor", "pointer");

              textNodes
                .transition()
                .duration(800)
                .delay((d, i) => i * 15)
                .style("opacity", 0.95);

              textNodes
                .on("mouseover", function (event, d) {
                  g.selectAll("text")
                    .transition()
                    .duration(300)
                    .style("opacity", (x) => (x.cat === d.cat ? 1 : 0.15))
                    .style("filter", (x) => (x.cat === d.cat ? "drop-shadow(0px 2px 4px rgba(0,0,0,0.15))" : "none"));

                  tooltip.html(`
                    <div class="word-title">${d.text}</div>
                    类别：${d.cat}<br/>
                    频次：<span>${d.value}</span>
                  `);
                  tooltip.style("opacity", 1);
                })
                .on("mousemove", function (event) {
                  tooltip.style("left", event.pageX + 15 + "px").style("top", event.pageY - 15 + "px");
                })
                .on("mouseout", function () {
                  g.selectAll("text")
                    .transition()
                    .duration(400)
                    .style("opacity", 0.95)
                    .style("filter", "none");
                  tooltip.style("opacity", 0);
                });
            });

          layout.start();
        }

        renderCloud();
        let resizeTimer;
        window.addEventListener("resize", () => {
          clearTimeout(resizeTimer);
          resizeTimer = setTimeout(renderCloud, 200);
        });
      })();
    </script>
  </body>
</html>
