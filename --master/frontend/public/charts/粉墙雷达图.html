<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>粉墙 雷达图</title>
    <script src="../echarts.min.js"></script>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        background: transparent;
        overflow: hidden;
        font-family: Georgia, "KaiTi", "楷体", "华文楷体", STKaiti, serif;
      }
      .wrap {
        width: 100%;
        height: 100%;
        padding: 12px 10px 10px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
      }
      .title {
        font-family: 'STKaiti', '华文楷体', 'KaiTi', serif;
        font-size: 1.5rem;
        font-weight: 600;
        color: #4A4A48;
        letter-spacing: 4px;
        margin: 0 0 8px 4px;
        padding-bottom: 6px;
        position: relative;
        flex-shrink: 0;
      }
      .title::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        width: 36px;
        height: 2px;
        background: #A9C1C0;
      }
      #radar {
        flex: 1;
        min-height: 0;
        width: 100%;
        height: calc(100% - 21px);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="title">粉墙：村落美学与构造要点 雷达图（示意）</div>
      <div id="radar"></div>
    </div>
    <script>
      (function () {
        const dom = document.getElementById("radar");
        const chart = echarts.init(dom);

        const indicators = [
          { name: "留白感", max: 100 },
          { name: "肌理细度", max: 100 },
          { name: "色泽克制", max: 100 },
          { name: "装饰节制", max: 100 },
          { name: "结构适配", max: 100 },
        ];

        const option = {
          backgroundColor: "transparent",
          grid: { left: 0, right: 0, top: 0, bottom: 0 },
          radar: {
            radius: "78%",
            center: ["50%", "50%"],
            axisLine: {
              lineStyle: { color: "rgba(242,239,233,0.9)" },
            },
            splitLine: {
              lineStyle: { color: "rgba(242,239,233,0.9)" },
            },
            splitArea: {
              areaStyle: { color: ["rgba(74,74,72,0.02)", "rgba(74,74,72,0.04)"] },
            },
            name: {
              textStyle: { color: "rgba(74,74,72,0.85)", fontSize: 11 },
            },
          },
          series: [
            {
              type: "radar",
              data: [
                {
                  value: [82, 74, 66, 71, 88],
                  name: "粉墙",
                  symbol: "circle",
                  symbolSize: 6,
                  lineStyle: { color: "#4A4A48", width: 2 },
                  itemStyle: { color: "#F7A072" },
                  areaStyle: { color: "rgba(247,160,114,0.18)" },
                },
              ],
            },
          ],
        };

        chart.setOption(option);

        window.addEventListener("resize", function () {
          chart.resize();
        });
      })();
    </script>
  </body>
</html>
