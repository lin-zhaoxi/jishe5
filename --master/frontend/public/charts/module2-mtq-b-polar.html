<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>马头墙防火效能 · 极坐标图（美化版）</title>
    <script src="https://fastly.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
      :root {
        --paper-bg: #F8F6F0;
        --title-color: #2b333e;
        --subtitle-color: #8c939d;
        --line-color: #6C7A89;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        /* 雅致的暖色背景 */
        background-color: var(--paper-bg);
        font-family: Georgia, "KaiTi", "楷体", "华文楷体", STKaiti, serif;
      }

      .wrap {
        width: 100%;
        height: 100%;
        padding: 24px 32px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
      }

      .header {
        margin-bottom: 10px;
        position: relative;
        padding-left: 14px;
      }

      .header::before {
        content: "";
        position: absolute;
        left: 0;
        top: 4px;
        bottom: 2px;
        width: 4px;
        background: var(--line-color);
        border-radius: 2px;
      }

      .title {
        font-size: 22px;
        font-weight: bold;
        letter-spacing: 2px;
        color: var(--title-color);
        margin: 0 0 4px 0;
      }

      .chart-wrapper {
        width: 100%;
        flex: 1;
        min-height: 0;
        position: relative;
      }

      .chart-container {
        width: 100%;
        height: 100%;
      }

      /* 右侧信息面板：毛玻璃质感与图例结合 */
      .side-panel {
        position: absolute;
        right: 10px;
        top: 8px;
        width: 226px;
        padding: 14px 14px 12px;
        background: rgba(250, 247, 240, 0.86);
        border: 1px solid rgba(201, 189, 170, 0.75);
        border-radius: 12px;
        box-shadow: 0 8px 32px -8px rgba(50, 40, 20, 0.1);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        z-index: 20;
        pointer-events: auto;
        box-sizing: border-box;
      }

      .side-title {
        font-size: 16px;
        font-weight: 700;
        color: #2F3630;
        letter-spacing: 1px;
        margin-bottom: 12px;
        padding-bottom: 8px;
        border-bottom: 1px dashed rgba(200, 190, 175, 0.8);
      }

      .side-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 13px;
        color: #555;
        line-height: 2;
        margin: 4px 0;
        font-family: Georgia, "KaiTi", "楷体", "华文楷体", STKaiti, serif;
        cursor: pointer;
        user-select: none;
        transition: opacity 160ms ease, background 160ms ease;
        border-radius: 6px;
        padding: 0 2px;
      }

      .side-row:hover {
        background: rgba(120, 107, 90, 0.06);
      }

      .side-row.off {
        opacity: 0.35;
      }

      .side-key {
        display: flex;
        align-items: center;
        color: #5B544B;
      }

      .legend-mark {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        margin-right: 8px;
      }

      .legend-dot {
        display: inline-block;
        width: 7px;
        height: 7px;
        border-radius: 50%;
      }

      .legend-block {
        display: inline-block;
        width: 12px;
        height: 8px;
        border-radius: 2px;
      }

      .legend-line {
        display: inline-block;
        width: 13px;
        height: 2px;
        border-radius: 999px;
      }

      .legend-line.dashed {
        height: 0;
        border-top: 2px dashed currentColor;
        background: transparent !important;
        border-radius: 0;
      }

      .side-val {
        color: #2B2824;
        font-weight: 700;
        font-family: Georgia, "KaiTi", "楷体", "华文楷体", STKaiti, serif;
        font-size: 14px;
      }

      /* 分隔线 */
      .divider {
        height: 1px;
        background: rgba(170, 160, 146, 0.35);
        margin: 8px 0;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <div class="title">马头墙防火效能 · 阻隔率综合图谱（图表二）</div>
      </div>

      <div class="chart-wrapper">
        <div id="ink-chart-contrast" class="chart-container"></div>

        <div class="side-panel" id="mtqSidePanel">
          <div class="side-title" id="mtqSideTitle">一阶马头墙</div>
          <div class="side-row" data-si="0">
            <span class="side-key"><span class="legend-mark"><i class="legend-block" style="background:#C25757"></i></span>热辐射阻隔率</span>
            <span class="side-val" id="mtqVal0A">--%</span>
          </div>
          <div class="side-row" data-si="1">
            <span class="side-key"><span class="legend-mark"><i class="legend-block" style="background:#D89955"></i></span>热羽流阻隔率</span>
            <span class="side-val" id="mtqVal0B">--%</span>
          </div>
          <div class="side-row" data-si="2">
            <span class="side-key"><span class="legend-mark"><i class="legend-block" style="background:#5B6D8A"></i></span>飞火阻隔率</span>
            <span class="side-val" id="mtqVal0C">--%</span>
          </div>
          
          <div class="divider"></div>
          
          <div class="side-row" data-si="3">
            <span class="side-key"><span class="legend-mark"><i class="legend-dot" style="background:#1E4740"></i><i class="legend-line" style="background:#1E4740"></i></span>综合提升率</span>
            <span class="side-val" id="mtqVal1" style="color:#1E4740">--%</span>
          </div>
          <div class="side-row" data-si="4">
            <span class="side-key"><span class="legend-mark"><i class="legend-dot" style="background:#4A6B7C"></i><i class="legend-line dashed" style="color:#4A6B7C"></i></span>屋脊处</span>
            <span class="side-val" id="mtqVal2A">--%</span>
          </div>
          <div class="side-row" data-si="5">
            <span class="side-key"><span class="legend-mark"><i class="legend-dot" style="background:#788762"></i><i class="legend-line dashed" style="color:#788762"></i></span>前檐处</span>
            <span class="side-val" id="mtqVal2B">--%</span>
          </div>
          <div class="side-row" data-si="6">
            <span class="side-key"><span class="legend-mark"><i class="legend-dot" style="background:#8A6969"></i><i class="legend-line dashed" style="color:#8A6969"></i></span>后檐处</span>
            <span class="side-val" id="mtqVal2C">--%</span>
          </div>
        </div>
      </div>
    </div>

    <script>
      (function () {
        // 数据源保持不变
        const categories = ["一阶马头墙", "三阶马头墙", "五阶马头墙"];
        const heatRadiation = [41.47, 75.25, 82.5];
        const thermalPlume = [11.99, 24.63, 39.4];
        const flyingBrand = [0.22, 1.9, 2.05];
        const overallImprovement = [24.37, 48.83, 53.48];
        const ridgeData = [36.55, 55.42, 61.11];
        const eaveData = [-10.47, 22.02, 50.27];
        const backEaveData = [30.76, 45.59, 40.49];

        // 重新定义传统中式配色
        const palette = {
          bar1: "#A84638",
          bar2: "#C48B47",
          bar3: "#5B6D8A",
          lineOverall: "#2F5A50",
          lineRidge: "#627B8A",
          lineEave: "#5F7F6B",
          lineBack: "#9C4E4E",
        };

        const option = {
          animationDuration: 1500,
          animationEasing: 'cubicOut',
          tooltip: { show: false }, // 由面板接管
          polar: {
            radius: ["15%", "66%"],
            center: ["29%", "52%"],
          },
          legend: {
            show: false,
            selectedMode: "multiple",
            selected: {
              "热辐射": true,
              "热羽流": true,
              "飞火": true,
              "综合": true,
              "屋脊": true,
              "前檐": true,
              "后檐": true,
            },
          },
          angleAxis: {
            type: "category",
            data: categories,
            axisLabel: {
              color: "#3F3A30",
              fontSize: 14,
              fontWeight: "bold",
              margin: 16,
              fontFamily: 'Georgia, "KaiTi", "楷体", "华文楷体", STKaiti, serif',
            },
            axisLine: { lineStyle: { color: "rgba(0,0,0,0.1)" } },
            axisTick: { show: false },
          },
          radiusAxis: {
            name: "阻隔率 (%)",
            nameTextStyle: {
              color: "#8B8475",
              fontSize: 12,
              padding: [0, 0, 10, 0],
              fontFamily: 'Georgia, "KaiTi", "楷体", "华文楷体", STKaiti, serif',
            },
            min: -20, // 扩大最小值以容纳前檐的 -10.47
            max: 90,
            axisLabel: {
              color: "#888",
              fontSize: 10,
              formatter: "{value}%",
              fontFamily: 'Georgia, "KaiTi", "楷体", "华文楷体", STKaiti, serif',
            },
            splitLine: { 
              lineStyle: { color: "rgba(180, 170, 150, 0.3)", type: "dotted", width: 1 } 
            },
            axisLine: { show: false },
          },
          series: [
            // --- 柱状图系列 (基础蔓延方式) ---
            {
              name: "热辐射",
              type: "bar",
              data: heatRadiation,
              coordinateSystem: "polar",
              roundCap: true,
              barCategoryGap: "20%",
              itemStyle: {
                color: palette.bar1,
                opacity: 0.3,
                borderRadius: [4, 4, 0, 0],
              },
              emphasis: { itemStyle: { opacity: 0.68, shadowBlur: 8, shadowColor: 'rgba(168, 70, 56, 0.3)' } },
            },
            {
              name: "热羽流",
              type: "bar",
              data: thermalPlume,
              coordinateSystem: "polar",
              roundCap: true,
              itemStyle: { color: palette.bar2, opacity: 0.28, borderRadius: [4, 4, 0, 0] },
              emphasis: { itemStyle: { opacity: 0.64, shadowBlur: 8, shadowColor: 'rgba(196, 139, 71, 0.3)' } },
            },
            {
              name: "飞火",
              type: "bar",
              data: flyingBrand,
              coordinateSystem: "polar",
              roundCap: true,
              itemStyle: {
                color: palette.bar3,
                opacity: 0.46,
                borderRadius: [4, 4, 0, 0],
                borderColor: "rgba(255,255,255,0.7)",
                borderWidth: 1,
              },
              emphasis: { itemStyle: { opacity: 0.78, shadowBlur: 8, shadowColor: 'rgba(91, 109, 138, 0.35)' } },
            },
            // --- 折线图系列 (综合与具体位置) ---
            {
              name: "综合",
              type: "line",
              data: overallImprovement,
              coordinateSystem: "polar",
              symbol: "circle",
              symbolSize: 8,
              lineStyle: {
                width: 3,
                color: palette.lineOverall,
                shadowBlur: 8,
                shadowColor: "rgba(30, 71, 64, 0.3)",
                shadowOffsetY: 2
              },
              itemStyle: { color: palette.lineOverall, borderColor: "#FFF", borderWidth: 2 },
              smooth: true,
              emphasis: { lineStyle: { width: 4 } },
            },
            {
              name: "屋脊",
              type: "line",
              data: ridgeData,
              coordinateSystem: "polar",
              symbol: "diamond",
              symbolSize: 8,
              lineStyle: { width: 2, color: palette.lineRidge, type: "dashed", opacity: 0.8 },
              itemStyle: { color: palette.lineRidge, opacity: 0.8 },
              emphasis: { lineStyle: { width: 3, opacity: 1 }, itemStyle: { opacity: 1 } },
            },
            {
              name: "前檐",
              type: "line",
              data: eaveData,
              coordinateSystem: "polar",
              symbol: "triangle",
              symbolSize: 8,
              lineStyle: { width: 2, color: palette.lineEave, type: "dashed", opacity: 0.8 },
              itemStyle: { color: palette.lineEave, opacity: 0.8 },
              emphasis: { lineStyle: { width: 3, opacity: 1 }, itemStyle: { opacity: 1 } },
            },
            {
              name: "后檐",
              type: "line",
              data: backEaveData,
              coordinateSystem: "polar",
              symbol: "rect",
              symbolSize: 6,
              lineStyle: { width: 2, color: palette.lineBack, type: "dashed", opacity: 0.8 },
              itemStyle: { color: palette.lineBack, opacity: 0.8 },
              emphasis: { lineStyle: { width: 3, opacity: 1 }, itemStyle: { opacity: 1 } },
            },
          ],
        };

        const dom = document.getElementById("ink-chart-contrast");
        const inkChart = echarts.init(dom);
        inkChart.setOption(option);

        // 面板元素绑定
        const uiElements = {
          title: document.getElementById("mtqSideTitle"),
          vals: [
            document.getElementById("mtqVal0A"), document.getElementById("mtqVal0B"), document.getElementById("mtqVal0C"),
            document.getElementById("mtqVal1"),
            document.getElementById("mtqVal2A"), document.getElementById("mtqVal2B"), document.getElementById("mtqVal2C")
          ]
        };
        const seriesNames = ["热辐射", "热羽流", "飞火", "综合", "屋脊", "前檐", "后檐"];
        const rowEls = Array.from(document.querySelectorAll(".side-row[data-si]"));
        const selectedMap = {
          "热辐射": true,
          "热羽流": true,
          "飞火": true,
          "综合": true,
          "屋脊": true,
          "前檐": true,
          "后檐": true,
        };
        const datasets = [heatRadiation, thermalPlume, flyingBrand, overallImprovement, ridgeData, eaveData, backEaveData];

        function fmt(n) {
          if (typeof n !== "number" || Number.isNaN(n)) return "--";
          return `${n > 0 ? '+' : ''}${n.toFixed(2)}%`; // 增加正负号区分
        }

        function setSidePanel(idx) {
          if (idx < 0 || idx >= categories.length) return;
          uiElements.title.textContent = categories[idx];
          uiElements.vals.forEach((el, i) => {
            if (el) el.textContent = fmt(datasets[i][idx]);
          });
        }

        function syncRowState() {
          rowEls.forEach((row) => {
            const si = Number(row.getAttribute("data-si"));
            const name = seriesNames[si];
            if (!name) return;
            row.classList.toggle("off", !selectedMap[name]);
          });
        }

        function toggleHighlight(idx, isHighlight) {
          const action = isHighlight ? "highlight" : "downplay";
          [0,1,2,3,4,5,6].forEach(si => inkChart.dispatchAction({ type: action, seriesIndex: si, dataIndex: idx }));
        }

        // 默认状态
        setSidePanel(0);
        syncRowState();

        // 交互事件
        inkChart.on("mouseover", (params) => {
          if (params && typeof params.dataIndex === "number") {
            toggleHighlight(params.dataIndex, true);
            setSidePanel(params.dataIndex);
          }
        });

        inkChart.on("mouseout", (params) => {
          if (params && typeof params.dataIndex === "number") {
             toggleHighlight(params.dataIndex, false);
          }
        });

        rowEls.forEach((row) => {
          row.addEventListener("click", () => {
            const si = Number(row.getAttribute("data-si"));
            const name = seriesNames[si];
            if (!name) return;
            const next = !selectedMap[name];
            const activeCount = Object.values(selectedMap).filter(Boolean).length;
            if (!next && activeCount <= 1) return; // 至少保留一个系列
            selectedMap[name] = next;
            inkChart.dispatchAction({ type: "legendToggleSelect", name });
            syncRowState();
          });
        });

        window.addEventListener("resize", () => inkChart.resize());
      })();
    </script>
  </body>
</html>
