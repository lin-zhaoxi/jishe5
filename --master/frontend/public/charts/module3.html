<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>模块三</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f2eee6;
      --panel: #f7f3ea;
      --ink: #4a4a48;
      --muted: #8eb8b7;
      --border: #e7dfd2;
      --accent: #f25c33;
      --title-color: #2b333e;
      --subtitle-color: #8c939d;
      --line-color: #6C7A89;
      --shadow: rgba(74, 74, 72, 0.18);
      --radius-lg: 14px;
      --radius-md: 10px;
      --radius-sm: 8px;
      --radius-xs: 6px;
      --stroke-soft: 1px solid rgba(214, 201, 184, 0.55);
      --stroke-faint: 1px solid rgba(214, 201, 184, 0.38);
      --elev-soft: 0 10px 22px -18px var(--shadow);
      --elev-float: 0 8px 20px -14px rgba(50, 47, 43, 0.55);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
      font-family: Georgia, 'KaiTi', '楷体', '华文楷体', STKaiti, serif;
    }

    .canvas {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: 43% 57%;
      gap: 8px;
      padding: 8px;
    }

    .panel {
      background: #f5f0e7;
      border: var(--stroke-soft);
      border-radius: var(--radius-lg);
      box-shadow: var(--elev-soft);
      min-height: 360px;
      overflow: hidden;
    }

    /* 上半：卡片区 */
    .top {
      display: grid;
      grid-template-rows: 38px 1fr;
      gap: 8px;
      padding: 8px;
      min-height: 0;
    }

    .top-tabs {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .tab-btn {
      border: 1px solid rgba(150, 136, 116, 0.32);
      background: rgba(255, 255, 255, 0.35);
      color: #5a534a;
      border-radius: var(--radius-sm);
      padding: 5px 14px;
      font-size: 13px;
      letter-spacing: 1px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s ease;
    }

    .tab-btn.active {
      background: rgba(110, 88, 63, 0.12);
      border-color: rgba(110, 88, 63, 0.48);
      color: #473d33;
      font-weight: 700;
    }

    .card-grid {
      display: flex;
      gap: 8px;
      min-height: 0;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-behavior: smooth;
      padding: 0 8px;
    }

    .card-grid::-webkit-scrollbar {
      height: 6px;
    }

    .card-grid::-webkit-scrollbar-track {
      background: rgba(214, 201, 184, 0.2);
      border-radius: 3px;
    }

    .card-grid::-webkit-scrollbar-thumb {
      background: rgba(143, 114, 80, 0.4);
      border-radius: 3px;
    }

    .card-grid::-webkit-scrollbar-thumb:hover {
      background: rgba(143, 114, 80, 0.6);
    }

    .card {
      background: rgba(255, 255, 255, 0.33);
      border: var(--stroke-faint);
      border-radius: var(--radius-md);
      padding: 10px 10px 8px;
      display: grid;
      grid-template-rows: auto auto auto 1fr;
      gap: 6px;
      overflow: hidden;
      min-height: 0;
      flex: 0 0 calc(25% - 6px);
      min-width: 200px;
    }

    .card-thumb {
      width: 100%;
      aspect-ratio: 4 / 3;
      border-radius: var(--radius-sm);
      overflow: hidden;
      background: #ebe1d5;
      border: 1px solid rgba(214, 201, 184, 0.45);
    }

    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card h3 {
      font-size: 15px;
      line-height: 1.2;
      color: #3f3f3d;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card .meta {
      font-size: 12px;
      color: #8a7a64;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card .desc {
      font-size: 12px;
      line-height: 1.35;
      color: #5a5854;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      line-clamp: 3;
      -webkit-box-orient: vertical;
    }

    /* 下半：三雕三列 */
    .bottom {
      display: grid;
      grid-template-columns: 1.4fr 1.2fr 1.4fr;
      gap: 8px;
      min-height: 0;
    }

    .side-panel {
      background: #f5efe5;
      border: var(--stroke-soft);
      border-radius: var(--radius-lg);
      min-height: 0;
      display: grid;
      grid-template-rows: 40px 1fr;
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 12px 10px 26px;
      border-bottom: 1px solid rgba(214, 201, 184, 0.55);
      font-size: 18px;
      color: var(--title-color);
      letter-spacing: 2px;
      font-weight: 800;
      background: rgba(249, 243, 234, 0.6);
      position: relative;
    }

    .panel-head::before {
      content: "";
      position: absolute;
      left: 12px;
      top: 10px;
      bottom: 10px;
      width: 4px;
      border-radius: 2px;
      background: var(--line-color);
    }

    .panel-head small {
      color: var(--subtitle-color);
      letter-spacing: 1.5px;
      font-size: 11px;
      font-family: "Helvetica Neue", Arial, sans-serif;
      text-transform: uppercase;
    }

    .graph-head-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .graph-action {
      border: 1px solid rgba(143, 114, 80, 0.2);
      background: transparent;
      color: #6b5f52;
      border-radius: var(--radius-xs);
      font-size: 11px;
      padding: 2px 7px;
      cursor: pointer;
      font-family: inherit;
      line-height: 1.2;
      transition: all .2s ease;
    }

    .graph-action:hover {
      border-color: rgba(143, 114, 80, 0.45);
      color: #433d36;
      background: rgba(255, 255, 255, 0.26);
    }

    .graph-action.active {
      background: rgba(143, 114, 80, 0.12);
      border-color: rgba(143, 114, 80, 0.5);
      color: #4a3f34;
      font-weight: 700;
    }

    .center {
      background: #f5f0e8;
      border: var(--stroke-soft);
      border-radius: var(--radius-lg);
      box-shadow: var(--elev-soft);
      min-height: 0;
      padding: 8px;
      display: grid;
      grid-template-rows: minmax(0, 1fr) 34px 62px 34px 34px;
      gap: 8px;
      position: relative;
    }

    .carving-image-wrap {
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      min-height: 0;
      width: 92%;
      margin: 0 auto;
      background: #ebe1d5;
      overflow: hidden;
      position: relative;
    }

    .carving-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .carving-name {
      text-align: center;
      font-size: 24px;
      letter-spacing: 4px;
      color: #5b5046;
      line-height: 30px;
      user-select: none;
    }

    .switch-btn {
      width: 100%;
      height: 34px;
      border-radius: 0;
      border: 0;
      border-bottom: 1px solid rgba(143, 114, 80, 0.26);
      background: transparent;
      color: #655b50;
      font-size: 13px;
      letter-spacing: 2px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s ease;
    }

    .switch-btn.active {
      background: rgba(143, 114, 80, 0.06);
      border-bottom: 2px solid #8f7250;
      color: #453a30;
      font-weight: 700;
    }

    .center-brief {
      font-size: 18px;
      line-height: 1.45;
      color: #5f5a53;
      background: #f8f3ea;
      border: 1px solid #e8e1d6;
      border-radius: var(--radius-md);
      padding: 8px 10px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      line-clamp: 3;
      -webkit-box-orient: vertical;
    }

    .triangle-btn {
      position: absolute;
      top: 42%;
      transform: translateY(-50%);
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 1.5px solid rgba(143, 114, 80, 0.48);
      background: rgba(245, 240, 232, 0.9);
      box-shadow: 0 2px 8px rgba(91, 75, 61, 0.18);
      cursor: pointer;
      z-index: 5;
      padding: 0;
      color: #8f7250;
      line-height: 22px;
      font-size: 14px;
    }

    .triangle-btn.left {
      left: calc(4% - 24px);
    }

    .triangle-btn.right {
      right: calc(4% - 24px);
    }

    .triangle-btn.left::before {
      content: '‹';
      display: inline-block;
      transform: translateX(-1px);
    }

    .triangle-btn.right::before {
      content: '›';
      display: inline-block;
      transform: translateX(1px);
    }

    .triangle-btn:hover {
      border-color: rgba(143, 114, 80, 0.55);
      color: #5b4b3d;
      background: rgba(255, 255, 255, 0.75);
    }

    .graph-wrap {
      min-height: 0;
      padding: 8px;
      background: #f4efea;
      position: relative;
    }

    .graph-svg {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.25);
    }

    .graph-legend {
      position: absolute;
      left: 14px;
      top: 12px;
      z-index: 6;
      background: rgba(246, 241, 232, 0.62);
      border: 0;
      border-radius: var(--radius-sm);
      padding: 6px 8px;
      display: grid;
      gap: 4px;
      font-size: 11px;
      color: #585147;
      pointer-events: none;
      box-shadow: inset 0 0 0 1px rgba(217, 208, 193, 0.3);
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      line-height: 1;
    }

    .legend-line {
      width: 24px;
      height: 0;
      border-top: 2px solid #8f867b;
    }

    .legend-line.dashed {
      border-top-style: dashed;
    }

    .legend-line.dotted {
      border-top-style: dotted;
    }

    .legend-dot {
      border-radius: 50%;
      background: #7f7468;
      display: inline-block;
    }

    .legend-dot.lg { width: 10px; height: 10px; }
    .legend-dot.md { width: 8px; height: 8px; }
    .legend-dot.sm { width: 6px; height: 6px; }

    .graph-tooltip {
      position: absolute;
      max-width: 240px;
      background: #F5F4EE;
      border: 1px solid #D9D0C1;
      border-radius: var(--radius-sm);
      padding: 8px 10px;
      font-size: 12px;
      line-height: 1.5;
      color: #333;
      box-shadow: var(--elev-float);
      pointer-events: none;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity .12s ease, transform .12s ease;
      z-index: 10;
      white-space: normal;
    }

    .graph-tooltip.show {
      opacity: 1;
      transform: translateY(0);
    }

    .tooltip-media {
      width: 100%;
      height: 76px;
      border: 1px solid #d8cebf;
      border-radius: var(--radius-xs);
      margin-bottom: 6px;
      overflow: hidden;
      background: #faf6ee;
      display: grid;
      place-items: center;
      color: #8e8578;
      font-size: 11px;
    }

    .tooltip-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .right-wrap {
      min-height: 0;
      padding: 24px 24px 20px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 16px;
      background: #f4efea;
    }

    .detail-top-nav {
      display: flex;
      flex-wrap: nowrap;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      padding-bottom: 10px;
      border-bottom: 1px solid #e7ddd0;
    }

    .detail-top-nav::-webkit-scrollbar {
      display: none;
    }

    .mini-btn {
      border: 1px solid rgba(199, 185, 164, 0.45);
      background: rgba(247, 242, 233, 0.44);
      color: #5a5248;
      border-radius: var(--radius-sm);
      min-height: 40px;
      padding: 0 18px;
      font-size: 12px;
      letter-spacing: 1px;
      white-space: nowrap;
      font-family: inherit;
      cursor: pointer;
      transition: transform .18s ease, background .18s ease, border-color .18s ease, color .18s ease, box-shadow .18s ease;
      position: relative;
      overflow: visible;
    }

    .mini-btn:hover {
      transform: translateY(-1px) scale(1.02);
      border-color: rgba(143, 114, 80, 0.42);
      background: rgba(255, 255, 255, 0.62);
    }

    .mini-btn.active {
      color: #3f342b;
      border-color: rgba(143, 114, 80, 0.38);
      background: rgba(143, 114, 80, 0.12);
      box-shadow: inset 0 -2px 0 rgba(143, 114, 80, 0.7);
      font-weight: 700;
    }

    .mini-btn.active::before {
      content: '';
      position: absolute;
      left: 8px;
      right: 8px;
      bottom: -5px;
      height: 8px;
      border: 1px solid rgba(180, 161, 132, 0.45);
      border-top: 0;
      border-radius: 0 0 6px 6px;
      background: linear-gradient(180deg, rgba(245, 236, 223, 0.92) 0%, rgba(236, 223, 204, 0.92) 100%);
      z-index: -1;
      pointer-events: none;
      transform-origin: 50% 50%;
      transform: scaleX(1);
    }

    .mini-btn::before {
      content: '';
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: -5px;
      height: 8px;
      border: 1px solid rgba(180, 161, 132, 0.38);
      border-top: 0;
      border-radius: 0 0 6px 6px;
      background: linear-gradient(180deg, rgba(245, 236, 223, 0.6) 0%, rgba(236, 223, 204, 0.6) 100%);
      z-index: -1;
      pointer-events: none;
      transform-origin: 50% 50%;
      transform: scaleX(0);
      transition: transform .18s ease, opacity .18s ease;
      opacity: 0;
    }

    .mini-btn:hover::before {
      transform: scaleX(1);
      opacity: 1;
    }

    .mini-btn.active::before {
      opacity: 1;
      transform: scaleX(1);
    }


    .detail-content {
      border: 0;
      border-radius: 0;
      background: #F5F4EE;
      box-shadow: none;
      padding: 24px 24px 20px;
      overflow: auto;
      font-size: 13px;
      line-height: 1.95;
      color: #4f4a43;
      min-height: 340px;
      opacity: 0;
      transform: translateY(5px);
      transition: opacity .3s ease, transform .3s ease;
    }

    .detail-content.show {
      opacity: 1;
      transform: translateY(0);
    }

    .detail-content ul {
      padding-left: 18px;
    }

    .detail-content li + li {
      margin-top: 2px;
    }

    .detail-content p,
    .detail-content span,
    .detail-content li,
    .detail-content div {
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    }

    .detail-content strong,
    .step-title,
    .gallery-tag,
    .timeline-item strong,
    .intro-dropcap,
    .intro-stamp {
      font-family: "STSong", "SimSun", "KaiTi", serif;
    }

    .detail-step-list {
      display: grid;
      gap: 12px;
    }

    .detail-step {
      display: grid;
      grid-template-columns: 30px 78px 1fr;
      gap: 12px;
      align-items: center;
      background: transparent;
      border: 0;
      border-radius: 0;
      padding: 7px 0 12px;
      border-bottom: 1px solid #D9D0C1;
    }

    .expand-item {
      cursor: pointer;
    }

    .expand-more {
      margin-top: 6px;
      font-size: 12px;
      line-height: 1.75;
      color: #6b6258;
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transform: translateY(2px);
      transition: max-height .22s ease, opacity .22s ease, transform .22s ease;
    }

    .expand-item.is-open .expand-more {
      max-height: 220px;
      opacity: 1;
      transform: translateY(0);
    }

    .detail-step:last-child {
      border-bottom: 0;
    }

    .step-no {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      border: 1px solid #8f7250;
      color: #5f4a34;
      font-size: 14px;
      line-height: 34px;
      text-align: center;
      background: rgba(183, 146, 93, 0.16);
      font-weight: 700;
    }

    .step-title {
      font-weight: 700;
      color: #463e35;
      margin-bottom: 2px;
      font-size: 15px;
      line-height: 1.4;
    }

    .item-media {
      width: 100%;
      height: 48px;
      border: 1px solid #E6DED1;
      border-radius: 3px;
      background: #F9F7F3;
      overflow: hidden;
      display: grid;
      place-items: center;
      color: #7d7366;
      font-size: 11px;
      line-height: 1.2;
      text-align: center;
      padding: 0;
      position: relative;
    }

    .item-media img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      padding: 1px;
      background: #f9f7f3;
      display: block;
    }

    .item-media::before,
    .item-media::after {
      content: none;
      position: absolute;
      width: 7px;
      height: 7px;
      border-color: rgba(143, 114, 80, 0.55);
      border-style: solid;
      pointer-events: none;
    }

    .item-media::before {
      top: 2px;
      left: 2px;
      border-width: 1px 0 0 1px;
    }

    .item-media::after {
      right: 2px;
      bottom: 2px;
      border-width: 0 1px 1px 0;
    }

    .detail-step .item-media {
      height: 70px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px 14px;
    }

    .grid-item {
      border: 0;
      border-radius: 0;
      background: transparent;
      padding: 6px 6px 10px;
      min-height: 84px;
      display: grid;
      align-content: center;
      gap: 5px;
      text-align: center;
      border-bottom: 1px solid #D9D0C1;
    }

    .grid-item .item-media {
      width: 80px;
      height: 80px;
      margin: 0 auto 4px;
      margin-bottom: 2px;
    }

    .grid-item strong {
      font-size: 14px;
      color: #3f372f;
      font-weight: 700;
    }

    .grid-item span {
      font-size: 12px;
      color: #8a8176;
      line-height: 1.45;
    }

    .detail-gallery {
      display: grid;
      gap: 10px;
    }

    .gallery-item {
      border: 0;
      border-radius: 0;
      background: transparent;
      padding: 8px 0 10px;
      display: grid;
      grid-template-columns: max-content 58px 1fr;
      gap: 10px;
      align-items: center;
      border-bottom: 1px solid #D9D0C1;
    }

    .gallery-text {
      display: grid;
      gap: 2px;
    }

    .gallery-sub {
      font-size: 12px;
      color: #7f756a;
      line-height: 1.6;
    }

    .gallery-tag {
      border-radius: 2px;
      border: 1px solid rgba(0, 0, 0, 0.08);
      background: #5d4f40;
      color: #f8f2e8;
      padding: 4px 12px;
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      width: max-content;
      white-space: nowrap;
    }

    .timeline-item .item-media {
      width: 78px;
      height: 44px;
      margin-top: 7px;
    }

    .timeline {
      display: grid;
      gap: 12px;
      padding-left: 4px;
      border-left: 3px solid rgba(143, 114, 80, 0.66);
    }

    .timeline-item {
      position: relative;
      padding: 10px 10px 10px 26px;
      background: rgba(255, 255, 255, 0.28);
      border: 1px solid #e2d9cd;
      border-radius: var(--radius-sm);
    }

    .timeline-item::before {
      content: '';
      position: absolute;
      left: -8px;
      top: 8px;
      width: 10px;
      height: 10px;
      transform: rotate(45deg);
      background: #8f7250;
      box-shadow: 0 0 0 2px #f5f4ee;
    }

    .timeline-item strong {
      display: block;
      font-size: 15px;
      color: #3f3327;
      margin-bottom: 2px;
    }

    .timeline-detail {
      margin-top: 6px;
      font-size: 12px;
      line-height: 1.75;
      color: #5b544c;
    }

    .intro-block {
      max-width: 82%;
      margin: 0 auto;
      position: relative;
      padding-right: 8px;
      line-height: 2;
    }

    .intro-main {
      position: relative;
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 4px;
    }

    .intro-tags {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .intro-tag {
      border: 1px solid #9b7b58;
      border-radius: 2px;
      padding: 3px 10px 4px;
      font-size: 12px;
      color: #f6efe4;
      background: linear-gradient(180deg, #6e543f 0%, #5c4636 100%);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.18), 0 1px 1px rgba(70, 54, 40, 0.18);
      font-family: "STSong", "SimSun", "KaiTi", serif;
      letter-spacing: 1px;
      position: relative;
    }

    .intro-tag::before,
    .intro-tag::after {
      content: '';
      position: absolute;
      width: 5px;
      height: 5px;
      border-color: rgba(214, 186, 150, 0.55);
      border-style: solid;
      pointer-events: none;
    }

    .intro-tag::before {
      top: 1px;
      left: 1px;

      display: inline-block;
      flex: 0 0 auto;
    }

    .intro-watermark {

      right: 0;
      bottom: -6px;

      bottom: auto;

    .intro-block.vertical .intro-stamp {

    }

    .process-rail {

    }

    .top {

    }

    .card-scroll-btn {

    }

    .card-scroll-btn:disabled {

    function cloneGraphData(data) {
      return {
        nodes: data.nodes.map(n => ({ ...n })),
        links: data.links.map(l => ({ ...l }))
      };
    }

    function generateLinksFromNodes(nodes) {
      const links = [];

      const craftRoots = nodes.filter(n => n.type === 'craft' && n.level === 'root');

      // 1) 先把每个雕种中心节点与该雕种的所有节点建立“归属”关系，保证整体联通
      craftRoots.forEach(root => {
        nodes
          .filter(n => n.id !== root.id && n.craft === root.craft && n.type !== 'craft')
          .forEach(n => {
            links.push({ source: root.id, target: n.id, relationType: 'affiliation' });
          });
      });

      // 2) 再根据节点的 mentorNames 生成师承边
      nodes
        .filter(n => n.type === 'inheritor' && Array.isArray(n.mentors) && n.mentors.length)
        .forEach(student => {
          student.mentors.forEach(mentorName => {
            const mentor = nodes.find(
              n => n.type === 'inheritor' && n.craft === student.craft && n.name === mentorName
            );
            if (mentor) {
              links.push({
                source: mentor.id,
                target: student.id,
                relationType: 'master-apprentice'
              });
            }
          });
        });

      // 3) 生成作品节点与传承人的“代表作关联”
      nodes
        .filter(n => (n.type === 'work' || n.type === 'masterpiece' || n.level === 'work') && Array.isArray(n.workOf))
        .forEach(work => {
          work.workOf.forEach(personName => {
            const person = nodes.find(
              n => n.type === 'inheritor' && n.craft === work.craft && n.name === personName
            );
            if (person) {
              links.push({
                source: work.id,
                target: person.id,
                relationType: 'work-of'
              });
            }
          });
        });

      return links;
    }

    function computeVisibleNodeIds(nodes, allowedLevels) {
      const allowed = new Set(allowedLevels);
      return new Set(
        nodes
          .filter(n => n.level === 'root' || n.level === 'work' || allowed.has(n.level))
          .map(n => n.id)
      );
    }

    function setLevelFilter(key) {
      state.levelFilterKey = key;

      state.activeNodeId = null;

    function getNodeRadius(node) {
      if (node.level === 'root') return 20;
      if (node.level === 'national') return 18;
      if (node.level === 'provincial') return 15;
      if (node.level === 'city') return 12;
      if (node.level === 'county') return 10.5;
      if (node.level === 'work') return 12;
      if (node.level === 'general') return 11;
      return 11;
    }

    function getNodeTooltip(node) {
      const typeLabel = node.type === 'craft'
        ? '雕种节点'
        : (node.type === 'inheritor' ? '传承人节点' : '传世名作节点');
      const levelLabel = {
        root: '核心',
        national: '国家级',
        provincial: '省级',
        city: '市级',
        county: '县级',
        general: '一般',
        work: '代表作'
      }[node.level] || '一般';
      const craftName = craftData[node.craft]?.name || '';
      const media = node.image
        ? `<div class="tooltip-media"><img src="${node.image}" alt="${node.name}" loading="lazy" /></div>`
        : '';

      const title = `<strong>${node.name}</strong><br/>${craftName} · ${typeLabel} · ${levelLabel}`;
      const roleLine = node.role ? `${node.role}` : (node.desc ? `${node.desc}` : '');
      const originLine = node.origin ? `籍贯/地区：${node.origin}` : '';
      const studioLine = node.studio ? `工作室/机构：${node.studio}` : '';
      const mentorsLine = Array.isArray(node.mentors) && node.mentors.length
        ? `师从：${node.mentors.join('、')}`
        : '';
      const worksLine = Array.isArray(node.works) && node.works.length
        ? `代表作品：${node.works.join('、')}`
        : (typeof node.works === 'string' && node.works.trim() ? `代表作品：${node.works.trim()}` : '');

      const extraLines = [roleLine, originLine, studioLine, mentorsLine, worksLine].filter(Boolean).join('<br/>');
      return `${media}${title}${extraLines ? `<br/>${extraLines}` : ''}`;
    }

    function showGraphTooltip(html, x, y) {
      graphTooltip.innerHTML = html;
      graphTooltip.classList.add('show');

      const pad = 8;
      const tw = graphTooltip.offsetWidth || 220;
      const th = graphTooltip.offsetHeight || 60;
      const wrapW = graphWrap.clientWidth;
      const wrapH = graphWrap.clientHeight;

      const clampedX = Math.max(pad, Math.min(wrapW - tw - pad, x));
      const clampedY = Math.max(pad, Math.min(wrapH - th - pad, y));

      graphTooltip.style.left = `${clampedX}px`;
      graphTooltip.style.top = `${clampedY}px`;
    }

    function renderGraph() {
      if (!graphData.nodes.length) {
        graphSvg.innerHTML = `<text x="280" y="180" text-anchor="middle" font-size="14" fill="#8a8277">关系数据加载中...</text>`;
        return;
      }
      const activeCraft = state.activeCraft;
      const activeNodeId = state.activeNodeId;
      // 只渲染当前雕种（木/石/砖）相关的节点，避免三种雕种全部堆在一团
      const craftNodes = graphData.nodes.filter(
        n => n.craft === activeCraft || (n.type === 'craft' && n.craft === activeCraft)
      );
      const nodeMap = new Map(craftNodes.map(n => [n.id, n]));
      const levelConf = levelFilterMap[state.levelFilterKey] || levelFilterMap.all;
      const visibleNodeIds = computeVisibleNodeIds(craftNodes, levelConf.levels);
      let focusNodeId = activeNodeId || state.hoverNodeId;
      if (focusNodeId && !visibleNodeIds.has(focusNodeId)) focusNodeId = null;

      const linkSet = new Set();
      const neighborSet = new Set();
      if (focusNodeId) {
        neighborSet.add(focusNodeId);
        const linksFiltered = graphData.links.filter(
          l => visibleNodeIds.has(l.source) && visibleNodeIds.has(l.target)
        );
        linksFiltered.forEach(l => {
          if (l.source === focusNodeId || l.target === focusNodeId) {
            linkSet.add(`${l.source}|${l.target}`);
            linkSet.add(`${l.target}|${l.source}`);
            neighborSet.add(l.source);
            neighborSet.add(l.target);
          }
        });
      }

      const linksSvg = graphData.links
        .filter(link => visibleNodeIds.has(link.source) && visibleNodeIds.has(link.target))
        .map(link => {
        const s = nodeMap.get(link.source);
        const t = nodeMap.get(link.target);
        const rel = relationMeta[link.relationType] || relationMeta.affiliation;
        const isCraftFocus = s.craft === activeCraft;
        const isActiveLink = focusNodeId && linkSet.has(`${link.source}|${link.target}`);
        const color = isActiveLink ? '#A9332A' : craftData[s.craft].palette.soft;
        const opacity = focusNodeId
          ? (isActiveLink ? 1 : (isCraftFocus ? 0.25 : 0.06))
          : (isCraftFocus ? 0.8 : 0.1);
        const width = isActiveLink ? 2.7 : rel.width;
        const dash = rel.dash ? `stroke-dasharray="${rel.dash}"` : '';
        return `<line x1="${s.x}" y1="${s.y}" x2="${t.x}" y2="${t.y}" stroke="${color}" stroke-width="${width}" stroke-opacity="${opacity}" ${dash} data-link="${link.source}|${link.target}" data-link-label="${rel.label}" />`;
      }).join('');

      const nodesSvg = craftNodes
        .filter(node => visibleNodeIds.has(node.id))
        .map(node => {
        const r = getNodeRadius(node);
        const color = craftData[node.craft].palette.main;
        const isWorkLike = node.type === 'work' || node.type === 'masterpiece' || node.level === 'work';
        const isKeyLabel = node.level === 'root' || node.level === 'national' || node.level === 'provincial' || isWorkLike;
        const isFocusCraft = node.craft === activeCraft;
        const isActiveNode = node.id === activeNodeId;
        const isNeighbor = focusNodeId ? neighborSet.has(node.id) : false;
        const opacity = focusNodeId
          ? (isNeighbor ? 1 : (isFocusCraft ? 0.26 : 0.08))
          : (isActiveNode ? 1 : (isFocusCraft ? 1 : 0.15));
        const stroke = isActiveNode || (focusNodeId && node.id === focusNodeId) ? '#A9332A' : 'rgba(0,0,0,0.18)';
        const strokeW = isActiveNode ? 3 : (isWorkLike ? 2 : 1);
        const labelOnRight = node.x < 280;
        const labelX = labelOnRight ? node.x + r + 7 : node.x - r - 7;
        const labelAnchor = labelOnRight ? 'start' : 'end';
        const labelY = node.y + 4;
        const labelColor = isFocusCraft ? '#2A2A2A' : '#888';
        const labelOpacity = focusNodeId
          ? (isNeighbor ? 1 : (isKeyLabel ? 0.65 : 0.08))
          : (isKeyLabel ? 1 : 0.14);
        const labelSize = (node.level === 'root' || node.level === 'national') ? 14 : (isKeyLabel ? 13 : 11);
        return `
          <g data-node="${node.id}" style="cursor:pointer" data-tooltip='${getNodeTooltip(node).replace(/'/g, '&apos;')}'>
            <circle
              cx="${node.x}"
              cy="${node.y}"
              r="${r}"
              fill="${isWorkLike ? 'transparent' : color}"
              fill-opacity="${isWorkLike ? 0 : opacity}"
              stroke="${stroke}"
              stroke-width="${strokeW}"
              ${isWorkLike ? 'stroke-dasharray="4 2"' : ''}
            />
            <text
              x="${labelX}"
              y="${labelY}"
              text-anchor="${labelAnchor}"
              font-size="${labelSize}"
              fill="${labelColor}"
              fill-opacity="${labelOpacity}"
              stroke="#F4EFEA"
              stroke-width="2.4"
              paint-order="stroke fill"
            >
              ${node.name}
            </text>
          </g>
        `;
      }).join('');

      graphSvg.innerHTML = linksSvg + nodesSvg;
      graphHint.textContent = `当前：${craftData[activeCraft].name} · ${levelConf.label}`;
    }

    function getCraftCenter(craft) {
      if (craft === 'wood') return { x: 145, y: 88 };
      if (craft === 'stone') return { x: 155, y: 280 };
      return { x: 455, y: 186 };
    }

    function runAutoLayout(iterations = 180) {
      if (!graphData.nodes.length || layoutLocked) return;
      if (layoutFrame) cancelAnimationFrame(layoutFrame);
      layoutRunning = true;
      updateLayoutButtons();

      const activeCraft = state.activeCraft;
      const nodes = graphData.nodes.filter(
        n => n.craft === activeCraft || (n.type === 'craft' && n.craft === activeCraft)
      );
      const nodeMap = new Map(nodes.map(n => [n.id, n]));
      nodes.forEach(n => {
        n.vx = n.vx || 0;
        n.vy = n.vy || 0;
      });

      let step = 0;
      const tick = () => {
        if (layoutLocked) {
          layoutRunning = false;
          updateLayoutButtons();
          return;
        }

        for (let i = 0; i < nodes.length; i++) {
          const a = nodes[i];
          for (let j = i + 1; j < nodes.length; j++) {
            const b = nodes[j];
            let dx = b.x - a.x;
            let dy = b.y - a.y;
            const d2 = dx * dx + dy * dy + 0.01;
            const d = Math.sqrt(d2);
            const rep = 6800 / d2;
            dx /= d;
            dy /= d;
            a.vx -= dx * rep;
            a.vy -= dy * rep;
            b.vx += dx * rep;
            b.vy += dy * rep;
          }
        }

        graphData.links
          .filter(l => nodeMap.has(l.source) && nodeMap.has(l.target))
          .forEach(link => {
          const s = nodeMap.get(link.source);
          const t = nodeMap.get(link.target);
          if (!s || !t) return;
          let dx = t.x - s.x;
          let dy = t.y - s.y;
          const d = Math.sqrt(dx * dx + dy * dy) || 1;
          const desired = link.relationType === 'affiliation' ? 120 : (link.relationType === 'work-of' ? 145 : 105);
          const spring = (d - desired) * 0.018;
          dx /= d;
          dy /= d;
          s.vx += dx * spring;
          s.vy += dy * spring;
          t.vx -= dx * spring;
          t.vy -= dy * spring;
        });

        const center = getActiveCraftCenter();
        nodes.forEach(n => {
          n.vx += (center.x - n.x) * 0.0032;
          n.vy += (center.y - n.y) * 0.0032;
          n.vx *= 0.84;
          n.vy *= 0.84;
          n.x = Math.max(26, Math.min(534, n.x + n.vx));
          n.y = Math.max(26, Math.min(334, n.y + n.vy));
        });

        renderGraph();
        step += 1;
        if (step < iterations) {
          layoutFrame = requestAnimationFrame(tick);
        } else {
          layoutRunning = false;
          layoutFrame = null;
          updateLayoutButtons();
        }
      };

      layoutFrame = requestAnimationFrame(tick);
    }

    function resetLayout() {
      if (!graphInitialData) return;
      if (layoutFrame) cancelAnimationFrame(layoutFrame);
      layoutFrame = null;
      layoutRunning = false;
      graphData = cloneGraphData(graphInitialData);
      state.activeNodeId = null;
      state.hoverNodeId = null;
      graphTooltip.classList.remove('show');
      updateLayoutButtons();
      renderAll();
    }

    async function loadGraphData() {
      const res = await fetch('/charts/module3-graph-data.json', { cache: 'no-store' });
      if (!res.ok) throw new Error(`graph data load failed: ${res.status}`);
      const json = await res.json();
      graphData = cloneGraphData(json);
      graphInitialData = cloneGraphData(json);

      // 若数据里没有给 x/y（或给得不完整），用雕种中心附近做初始化，避免 NaN 影响力导向计算
      graphData.nodes.forEach((n, idx) => {
        if (typeof n.x !== 'number' || typeof n.y !== 'number') {
          const c = getActiveCraftCenter();
          const angle = (idx * 0.62) % (Math.PI * 2);
          const radius = 55 + (idx % 9) * 16;
          n.x = c.x + Math.cos(angle) * radius;
          n.y = c.y + Math.sin(angle) * radius;
        }
        n.vx = n.vx || 0;
        n.vy = n.vy || 0;
      });
      graphInitialData.nodes.forEach((n, idx) => {
        if (typeof n.x !== 'number' || typeof n.y !== 'number') {
          const c = getActiveCraftCenter();
          const angle = (idx * 0.62) % (Math.PI * 2);
          const radius = 55 + (idx % 9) * 16;
          n.x = c.x + Math.cos(angle) * radius;
          n.y = c.y + Math.sin(angle) * radius;
        }
        n.vx = n.vx || 0;
        n.vy = n.vy || 0;
      });

      const shouldGenerate =
        Array.isArray(json.nodes) &&
        json.nodes.some(n => (Array.isArray(n.mentors) && n.mentors.length) || (Array.isArray(n.workOf) && n.workOf.length));

      if (shouldGenerate) {
        const links = generateLinksFromNodes(json.nodes);
        graphData.links = links;
        graphInitialData.links = links.map(l => ({ ...l }));
      }
    }

    function getSvgPoint(evt) {
      const pt = graphSvg.createSVGPoint();
      pt.x = evt.clientX;
      pt.y = evt.clientY;
      const matrix = graphSvg.getScreenCTM();
      if (!matrix) return { x: 0, y: 0 };
      const res = pt.matrixTransform(matrix.inverse());
      return {
        x: Math.max(24, Math.min(536, res.x)),
        y: Math.max(24, Math.min(336, res.y))
      };
    }

    function initGraphInteractions() {
      graphSvg.addEventListener('mousedown', (e) => {
        if (layoutLocked) return;
        const target = e.target.closest('[data-node]');
        if (!target) return;
        dragNodeId = target.getAttribute('data-node');
        dragMoved = false;
      });

      graphSvg.addEventListener('mousemove', (e) => {
        const nodeEl = e.target.closest('[data-node]');
        const linkEl = e.target.closest('[data-link]');

        if (dragNodeId) {
          const p = getSvgPoint(e);
          const node = graphData.nodes.find(n => n.id === dragNodeId);
          if (node) {
            node.x = p.x;
            node.y = p.y;
            node.vx = 0;
            node.vy = 0;
            dragMoved = true;
            graphTooltip.classList.remove('show');
            renderGraph();
          }
          return;
        }

        if (nodeEl) {
          const id = nodeEl.getAttribute('data-node');
          if (state.hoverNodeId !== id) {
            state.hoverNodeId = id;
            renderGraph();
          }
          const tip = nodeEl.getAttribute('data-tooltip').replace(/&apos;/g, "'");
          showGraphTooltip(tip, e.offsetX + 12, e.offsetY + 12);
          return;
        }

        if (linkEl) {
          if (state.hoverNodeId !== null) {
            state.hoverNodeId = null;
            renderGraph();
          }
          const label = linkEl.getAttribute('data-link-label');
          showGraphTooltip(`<strong>关系类型</strong><br/>${label}`, e.offsetX + 10, e.offsetY + 10);
          return;
        }

        if (state.hoverNodeId !== null) {
          state.hoverNodeId = null;
          renderGraph();
        }
        graphTooltip.classList.remove('show');
      });

      graphSvg.addEventListener('mouseup', () => {
        dragNodeId = null;
      });

      graphSvg.addEventListener('mouseleave', () => {
        dragNodeId = null;
        if (state.hoverNodeId !== null) {
          state.hoverNodeId = null;
          renderGraph();
        }
        graphTooltip.classList.remove('show');
      });

      graphSvg.addEventListener('click', (e) => {
        const target = e.target.closest('[data-node]');
        if (target) {
          if (dragMoved) {
            dragMoved = false;
            return;
          }
          const id = target.getAttribute('data-node');
          const node = graphData.nodes.find(n => n.id === id);
          state.activeNodeId = id;
          if (node && node.craft !== state.activeCraft) state.activeCraft = node.craft;
          renderAll();
          return;
        }
        state.activeNodeId = null;
        renderAll();
      });
    }

    function renderAll() {
      renderCarving();
      renderRightPanel();
      renderGraph();
    }

    btnPrev.addEventListener('click', () => {
      cycleCraft(-1);
    });

    btnNext.addEventListener('click', () => {
      cycleCraft(1);
    });

    btnAutoLayout.addEventListener('click', () => {
      runAutoLayout();
    });
    btnToggleFix.addEventListener('click', () => {
      layoutLocked = !layoutLocked;
      updateLayoutButtons();
    });
    btnResetLayout.addEventListener('click', () => {
      resetLayout();
    });

    btnLevelsAll.addEventListener('click', () => setLevelFilter('all'));
    btnLevelsNP.addEventListener('click', () => setLevelFilter('np'));
    btnLevelsNPC.addEventListener('click', () => setLevelFilter('npc'));

    initGraphInteractions();
    updateLayoutButtons();
    updateLevelFilterButtons();
    (async () => {
      try {
        await loadGraphData();
        renderAll();
      } catch (err) {
        graphSvg.innerHTML = `<text x="280" y="180" text-anchor="middle" font-size="13" fill="#8e3e30">关系数据加载失败，请检查 JSON 文件</text>`;
      }
    })();
  </script>
</body>
</html>
