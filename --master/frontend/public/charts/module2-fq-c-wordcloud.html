<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>粉墙关键词词云 · 图C</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3-cloud/1.2.5/d3.layout.cloud.min.js"></script>
    <style>
      :root {
        --paper-bg: #F8F6F0;
        --title-color: #2b333e;
        --subtitle-color: #8c939d;
        --line-color: #6C7A89;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background-color: var(--paper-bg);
        font-family: Georgia, "KaiTi", "楷体", "华文楷体", STKaiti, serif;
      }
      .wrap {
        width: 100%;
        height: 100%;
        padding: 24px 32px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
      }
      .header {
        margin-bottom: 20px;
        position: relative;
        padding-left: 14px;
      }
      .header::before {
        content: "";
        position: absolute;
        left: 0;
        top: 4px;
        bottom: 2px;
        width: 4px;
        background: var(--line-color);
        border-radius: 2px;
      }

      .title {
        font-size: 22px;
        font-weight: bold;
        letter-spacing: 2px;
        color: var(--title-color);
        margin: 0 0 4px 0;
      }

      .subtitle {
        font-family: "Helvetica Neue", Arial, sans-serif;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 1.5px;
        color: var(--subtitle-color);
        text-transform: uppercase;
      }

      #cloud {
        width: 100%;
        flex: 1;
        min-height: 0;
        border: 1px solid rgba(221, 226, 232, 0.95);
        border-radius: 12px;
        background: #f2eee6;
        box-shadow: 0 10px 26px -22px rgba(33, 46, 58, 0.35);
        position: relative;
      }
      svg {
        width: 100%;
        height: 100%;
        display: block;
      }
      .custom-tooltip {
        position: absolute;
        text-align: left;
        padding: 10px 14px;
        font-size: 13px;
        font-family: "Segoe UI", "PingFang SC", sans-serif;
        background: rgba(255, 255, 255, 0.95);
        border: 1px solid rgba(220, 210, 195, 0.9);
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        border-radius: 8px;
        pointer-events: none;
        opacity: 0;
        z-index: 100;
        color: #4a4638;
        line-height: 1.6;
        backdrop-filter: blur(4px);
        transition: opacity 0.18s ease;
      }
      .custom-tooltip .word-title {
        font-size: 15px;
        font-weight: bold;
        color: #222;
        margin-bottom: 4px;
        border-bottom: 1px dashed #ddd;
        padding-bottom: 2px;
      }
      .custom-tooltip span {
        font-weight: 600;
        color: #a34343;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <div class="title">粉墙 · 关键词词云图（图表二）</div>
        <div class="subtitle">Keyword Cloud of White-Wall Architecture</div>
      </div>
      <div id="cloud"></div>
    </div>
    <div id="tooltip" class="custom-tooltip"></div>

    <script>
      (function () {
        const words = [
          { text: "粉墙", value: 16, cat: "材料工艺" },
          { text: "白灰粉刷", value: 15, cat: "材料工艺" },
          { text: "灰浆体系", value: 13, cat: "材料工艺" },
          { text: "热阻", value: 14, cat: "热工性能" },
          { text: "传热系数", value: 14, cat: "热工性能" },
          { text: "反射", value: 13, cat: "热工性能" },
          { text: "外遮阳", value: 12, cat: "热工性能" },
          { text: "蓄热", value: 10, cat: "热工性能" },
          { text: "自然通风", value: 14, cat: "环境耦合" },
          { text: "水体蒸发", value: 10, cat: "环境耦合" },
          { text: "湿度偏高", value: 11, cat: "环境耦合" },
          { text: "空斗墙", value: 12, cat: "墙体构造" },
          { text: "青砖黄泥", value: 13, cat: "墙体构造" },
          { text: "水泥砖空斗", value: 9, cat: "墙体构造" },
          { text: "外保温复合墙", value: 11, cat: "墙体构造" },
          { text: "实砌墙体", value: 10, cat: "墙体构造" },
          { text: "保温最优", value: 12, cat: "结论导向" },
          { text: "保温最差", value: 12, cat: "结论导向" },
          { text: "夏季降温", value: 11, cat: "结论导向" },
          { text: "冬季失热", value: 11, cat: "结论导向" },
          { text: "粉墙黛瓦", value: 9, cat: "文化审美" },
          { text: "含蓄留白", value: 8, cat: "文化审美" },
          { text: "徽派风貌", value: 8, cat: "文化审美" },
          { text: "古建修复", value: 7, cat: "文化审美" },
          { text: "室内舒适", value: 9, cat: "结论导向" },
          { text: "构造机理", value: 8, cat: "墙体构造" },
          { text: "热湿平衡", value: 8, cat: "环境耦合" },
          { text: "被动防热", value: 10, cat: "热工性能" },
          { text: "夏热冬冷", value: 8, cat: "环境耦合" },
          { text: "墙体测试", value: 8, cat: "热工性能" },
        ];

        function colorByCat(cat) {
          if (cat === "热工性能") return "#8C4F45";
          if (cat === "材料工艺") return "#8B7560";
          if (cat === "墙体构造") return "#5B6D7C";
          if (cat === "环境耦合") return "#4E6C5C";
          if (cat === "结论导向") return "#33495C";
          return "#6F7F8C";
        }

        const tooltip = d3.select("#tooltip");

        function renderCloud() {
          const cloud = document.getElementById("cloud");
          const rect = cloud.getBoundingClientRect();
          const width = Math.max(300, Math.floor(rect.width));
          const height = Math.max(300, Math.floor(rect.height));
          cloud.innerHTML = "";

          const svg = d3
            .select("#cloud")
            .append("svg")
            .attr("viewBox", `0 0 ${width} ${height}`);

          const g = svg
            .append("g")
            .attr("transform", `translate(${width / 2},${height / 2})`);

          const baseScale = Math.min(width, height) / 400;
          const cloudWords = words.map((d) => ({
            text: d.text,
            size: (12 + d.value * 2.4) * baseScale,
            cat: d.cat,
            value: d.value,
          }));

          const layout = d3.layout
            .cloud()
            .size([width, height])
            .words(cloudWords)
            .padding(6)
            .rotate(() => (Math.random() > 0.9 ? 90 : 0))
            .font("KaiTi")
            .fontSize((d) => d.size)
            .on("end", (outWords) => {
              const textNodes = g
                .selectAll("text")
                .data(outWords)
                .enter()
                .append("text")
                .style("font-size", (d) => `${d.size}px`)
                .style("fill", (d) => colorByCat(d.cat))
                .style("opacity", 0)
                .style("font-weight", (d) => (d.value >= 12 ? 700 : 500))
                .style("text-shadow", "1px 1px 0 rgba(255,255,255,0.5)")
                .attr("text-anchor", "middle")
                .attr("transform", (d) => `translate(${d.x},${d.y}) rotate(${d.rotate})`)
                .text((d) => d.text)
                .style("cursor", "pointer");

              textNodes
                .transition()
                .duration(800)
                .delay((d, i) => i * 14)
                .style("opacity", 0.95);

              textNodes
                .on("mouseover", function (event, d) {
                  g.selectAll("text")
                    .transition()
                    .duration(260)
                    .style("opacity", (x) => (x.cat === d.cat ? 1 : 0.16))
                    .style("filter", (x) => (x.cat === d.cat ? "drop-shadow(0 2px 4px rgba(0,0,0,0.15))" : "none"));

                  tooltip.html(
                    `<div class="word-title">${d.text}</div>
                     类别：${d.cat}<br/>
                     强度：<span>${d.value}</span>`
                  );
                  tooltip.style("opacity", 1);
                })
                .on("mousemove", function (event) {
                  tooltip.style("left", event.pageX + 15 + "px").style("top", event.pageY - 15 + "px");
                })
                .on("mouseout", function () {
                  g.selectAll("text")
                    .transition()
                    .duration(320)
                    .style("opacity", 0.95)
                    .style("filter", "none");
                  tooltip.style("opacity", 0);
                });
            });

          layout.start();
        }

        renderCloud();
        let resizeTimer;
        window.addEventListener("resize", () => {
          clearTimeout(resizeTimer);
          resizeTimer = setTimeout(renderCloud, 180);
        });
      })();
    </script>
  </body>
</html>
