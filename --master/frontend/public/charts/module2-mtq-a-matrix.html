<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>马头墙 · 关系矩阵图</title>
    <script src="../echarts.min.js"></script>
    <style>
      :root {
        --paper-bg: #F8F6F0;
        --title-color: #2b333e;
        --subtitle-color: #8c939d;
        --line-color: #6C7A89;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background-color: var(--paper-bg);
        font-family: Georgia, "KaiTi", "楷体", "华文楷体", STKaiti, serif;
      }

      .wrap {
        width: 100%;
        height: 100%;
        padding: 24px 32px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
      }

      .header {
        margin-bottom: 10px;
        position: relative;
        padding-left: 14px;
      }

      .header::before {
        content: "";
        position: absolute;
        left: 0;
        top: 4px;
        bottom: 2px;
        width: 4px;
        background: var(--line-color);
        border-radius: 2px;
      }

      .title {
        font-size: 22px;
        font-weight: bold;
        letter-spacing: 2px;
        color: var(--title-color);
        margin: 0 0 4px 0;
      }

      #fullHeatMatrix {
        width: 100%;
        flex: 1;
        min-height: 0;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <div class="title">马头墙 · 三种蔓延方式的阻隔提升率热力矩阵</div>
      </div>
      <div id="fullHeatMatrix"></div>
    </div>

    <script>
      (function () {
        const dom = document.getElementById("fullHeatMatrix");
        const heatChart = echarts.init(dom, null, {
          renderer: "canvas",
          devicePixelRatio: Math.max(1, window.devicePixelRatio || 1),
        });

        // 完整数据：[蔓延方式-马头墙形式, 位置, 提升率(%)]
        const heatData = [
          // 热辐射
          ["热辐射-一阶", "屋脊处", 62.76],
          ["热辐射-一阶", "前檐处", -3.42],
          ["热辐射-一阶", "后檐处", 38.23],
          ["热辐射-一阶", "平均值", 41.47],
          ["热辐射-三阶", "屋脊处", 84.14],
          ["热辐射-三阶", "前檐处", 61.18],
          ["热辐射-三阶", "后檐处", 66.13],
          ["热辐射-三阶", "平均值", 75.25],
          ["热辐射-五阶", "屋脊处", 87.86],
          ["热辐射-五阶", "前檐处", 82.52],
          ["热辐射-五阶", "后檐处", 62.95],
          ["热辐射-五阶", "平均值", 82.5],
          // 热羽流
          ["热羽流-一阶", "屋脊处", 16.88],
          ["热羽流-一阶", "前檐处", -26.81],
          ["热羽流-一阶", "后檐处", 36.51],
          ["热羽流-一阶", "平均值", 11.99],
          ["热羽流-三阶", "屋脊处", 43.75],
          ["热羽流-三阶", "前檐处", -23.46],
          ["热羽流-三阶", "后檐处", 39.47],
          ["热羽流-三阶", "平均值", 24.63],
          ["热羽流-五阶", "屋脊处", 53.93],
          ["热羽流-五阶", "前檐处", 29.78],
          ["热羽流-五阶", "后檐处", 29.6],
          ["热羽流-五阶", "平均值", 39.4],
          // 飞火
          ["飞火-一阶", "屋脊处", 0.54],
          ["飞火-一阶", "前檐处", -3.6],
          ["飞火-一阶", "后檐处", 3.48],
          ["飞火-一阶", "平均值", 0.22],
          ["飞火-三阶", "屋脊处", 3.84],
          ["飞火-三阶", "前檐处", -4.76],
          ["飞火-三阶", "后檐处", 6.19],
          ["飞火-三阶", "平均值", 1.9],
          ["飞火-五阶", "屋脊处", 4.98],
          ["飞火-五阶", "前檐处", 0.36],
          ["飞火-五阶", "后檐处", 0.69],
          ["飞火-五阶", "平均值", 2.05],
        ];

        // X轴：蔓延方式+马头墙形式
        const xAxisData = [
          "热辐射-一阶",
          "热辐射-三阶",
          "热辐射-五阶",
          "热羽流-一阶",
          "热羽流-三阶",
          "热羽流-五阶",
          "飞火-一阶",
          "飞火-三阶",
          "飞火-五阶",
        ];

        // Y轴：位置
        const yAxisData = ["屋脊处", "前檐处", "后檐处", "平均值"];

        const option = {
          backgroundColor: "transparent",
          animation: false,
          animationDuration: 0,
          tooltip: {
            trigger: "item",
            position: "top",
            formatter: function (params) {
              return `${params.name[0]}<br/>${params.name[1]}：${params.value[2]}%`;
            },
          },
          grid: {
            top: 18,
            left: 68,
            right: 26,
            bottom: 64,
            containLabel: true,
          },
          xAxis: {
            type: "category",
            data: xAxisData,
            axisLine: { show: false },
            axisTick: { show: false },
            axisLabel: {
              fontSize: 12,
              interval: 0,
              rotate: 30,
              color: "#5b5246",
              fontFamily: 'Georgia, "KaiTi", "楷体", "华文楷体", STKaiti, serif',
            },
          },
          yAxis: {
            type: "category",
            data: yAxisData,
            axisLine: { show: false },
            axisTick: { show: false },
            axisLabel: {
              fontSize: 13,
              fontWeight: "500",
              color: "#4d4539",
              fontFamily: 'Georgia, "KaiTi", "楷体", "华文楷体", STKaiti, serif',
            },
          },
          visualMap: {
            min: -30,
            max: 90,
            calculable: true,
            orient: "horizontal",
            left: "center",
            bottom: "3%",
            inRange: {
              color: [
                "#3f4f66",
                "#6a7f95",
                "#a8b8c4",
                "#e8e3d8",
                "#f5e7c9",
                "#d8b88a",
                "#c58a5c",
                "#ab5c46",
                "#7f3028",
              ],
            },
            text: ["高提升率(%)", "低提升率(%)"],
            textStyle: {
              fontSize: 12,
              color: "#5d5548",
              fontFamily: 'Georgia, "KaiTi", "楷体", "华文楷体", STKaiti, serif',
            },
          },
          series: [
            {
              name: "阻隔提升率",
              type: "heatmap",
              data: heatData,
              label: {
                show: true,
                fontSize: 11,
                color: function (params) {
                  const v = params.value[2];
                  return v >= 52 || v <= -12 ? "#f9f6ef" : "#3e352c";
                },
                formatter: function (params) {
                  return params.value[2].toFixed(2);
                },
              },
              emphasis: {
                itemStyle: {
                  shadowBlur: 10,
                  shadowColor: "rgba(0,0,0,0.3)",
                },
              },
              progressive: 0,
            },
          ],
        };

        heatChart.setOption(option, true);

        window.addEventListener("resize", () => heatChart.resize());
      })();
    </script>
  </body>
</html>
