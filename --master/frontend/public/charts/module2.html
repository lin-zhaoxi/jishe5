<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>模块二占位布局</title>
    <style>
      :root {
        --bg: #f2eee6;
        --panel: #ffffff;
        --ink: #4a4a48;
        --border: #dde3ea;
        --shadow: rgba(74, 74, 72, 0.12);
        --fan-1: rgba(173, 145, 112, 0.14);
        --fan-2: rgba(142, 122, 107, 0.14);
        --fan-3: rgba(151, 108, 92, 0.16);
        --fan-4: rgba(108, 122, 137, 0.14);
        --fan-active: rgba(151, 108, 92, 0.95);
        --fan-size: clamp(340px, 27vw, 410px);
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: radial-gradient(circle at 50% 8%, #f6f2ea 0%, var(--bg) 62%, #ece5d8 100%);
        color: var(--ink);
        font-family: Georgia, 'KaiTi', '楷体', '华文楷体', STKaiti, serif;
      }

      ::-webkit-scrollbar { display: none; }

      .page {
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-rows: 1fr;
        position: relative;
      }

      .content {
        width: 100%;
        height: 100%;
        min-height: 0;
        padding: 8px 10px 10px;
        box-sizing: border-box;
        display: grid;
        grid-template-rows: 52% 48%;
        gap: 10px;
        opacity: 0;
        transform: translateY(12px) scale(0.996);
        transition: opacity 500ms ease, transform 620ms cubic-bezier(0.2, 0.7, 0.12, 1);
      }

      .page.ready .content {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      .topRow {
        min-height: 0;
        display: grid;
        /* 上层：A 占 3/7，B 占 4/7（宽度比例） */
        grid-template-columns: minmax(0, 3fr) minmax(0, 4fr);
        gap: 10px;
      }

      .bottomRow {
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(240px, var(--fan-size)) minmax(0, 0.77fr) minmax(0, 1.23fr);
        gap: 10px;
        align-items: stretch;
      }

      .panel {
        min-width: 0;
        min-height: 0;
        background: var(--panel);
        border: 1px solid rgba(221, 226, 232, 0.95);
        border-radius: 16px;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.64),
          0 14px 28px -24px rgba(33, 46, 58, 0.35);
        position: relative;
        overflow: hidden;
        opacity: 0;
        transform: translateY(12px) scale(0.992);
        transition: opacity 420ms ease, transform 520ms cubic-bezier(0.2, 0.7, 0.12, 1), border-color 240ms ease, box-shadow 260ms ease;
      }

      .page.ready .panel {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      .panelA { border-top-left-radius: 0; }
      .panelB { border-top-right-radius: 0; }
      .panelC {
        border-top-left-radius: 0;
        border-bottom-left-radius: 0;
      }
      .panelD {
        border-top-right-radius: 0;
        border-bottom-right-radius: 0;
      }

      .placeholder {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 16px;
        color: rgba(60, 60, 56, 0.95);
        font-size: 18px;
        letter-spacing: 1px;
        line-height: 1.8;
        user-select: none;
        background: linear-gradient(180deg, rgba(249, 245, 237, 0.94), rgba(245, 239, 229, 0.9));
        transition: opacity 200ms ease, transform 240ms ease;
        z-index: 2;
      }

      .panel-iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
        z-index: 1;
        opacity: 0;
        transform: scale(1.009);
        transition: opacity 280ms ease, transform 360ms ease;
      }

      .panel-iframe.ready {
        opacity: 1;
        transform: scale(1);
      }

      .fanWrap {
        position: relative;
        overflow: hidden;
        height: 100%;
        background: linear-gradient(145deg, rgba(250, 246, 239, 0.6), rgba(241, 233, 222, 0.42));
      }

      .fanSwitch {
        width: 100%;
        height: 100%;
        display: block;
      }

      .fan-path {
        fill: transparent;
        stroke: rgba(255, 255, 255, 0.92);
        stroke-width: 2.4;
        cursor: pointer;
        transition: fill 160ms ease;
        stroke-linecap: round;
        stroke-linejoin: round;
        filter: drop-shadow(0 10px 14px rgba(0, 0, 0, 0.06));
      }

      .fan-path[data-key="tj"],
      .fan-path[data-key="fq"],
      .fan-path[data-key="mtq"],
      .fan-path[data-key="wd"] {
        /* 纯色填充改为透明，显示下方 <image> */
        fill: transparent;
      }

      .fan-path.active {
        stroke: var(--fan-active);
        stroke-width: 3.4;
        filter: drop-shadow(0 14px 22px rgba(0, 0, 0, 0.12));
        fill: rgba(151, 108, 92, 0.12);
      }

      .fan-path.hover {
        fill: rgba(151, 108, 92, 0.08);
        stroke-width: 3.3;
      }

      .fan-label {
        font-size: 14px;
        fill: rgba(46, 52, 40, 0.92);
        font-weight: 600;
        pointer-events: none;
        opacity: 0.72;
        paint-order: stroke fill;
        stroke: rgba(247, 243, 234, 0.95);
        stroke-width: 3px;
        transition: opacity 180ms ease, font-size 180ms ease, fill 180ms ease;
      }

      .fan-label.active {
        opacity: 1;
        font-size: 16px;
        fill: rgba(46, 52, 40, 1);
        stroke: rgba(247, 243, 234, 1);
        stroke-width: 3.6px;
      }

      .fan-img {
        transition: opacity 260ms ease, filter 420ms ease;
        opacity: 0.55;
        filter: saturate(0.76) blur(1px);
      }

      .fanWrap.images-ready .fan-img {
        filter: saturate(1) blur(0);
      }

      .entryMask {
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at 50% 42%, rgba(248, 244, 236, 0.98), rgba(237, 229, 216, 0.98));
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 420ms ease, visibility 420ms ease;
      }

      .entryMask.hide {
        opacity: 0;
        visibility: hidden;
      }

      .entryBox {
        text-align: center;
        color: rgba(74, 74, 72, 0.88);
      }

      .entryTitle {
        font-size: 15px;
        letter-spacing: 2px;
        margin-bottom: 12px;
      }

      .entryBar {
        width: 180px;
        height: 3px;
        border-radius: 999px;
        background: rgba(209, 199, 182, 0.55);
        overflow: hidden;
      }

      .entryBar::after {
        content: "";
        display: block;
        width: 40%;
        height: 100%;
        background: linear-gradient(90deg, rgba(126, 154, 107, 0.2), rgba(47, 107, 94, 0.85), rgba(126, 154, 107, 0.2));
        animation: loadingSlide 900ms ease-in-out infinite;
      }

      @keyframes loadingSlide {
        0% { transform: translateX(-140%); }
        100% { transform: translateX(280%); }
      }
    </style>
  </head>

  <body>
    <div class="page">
      <div class="entryMask" id="entryMask">
        <div class="entryBox">
          <div class="entryTitle">模块二内容加载中</div>
          <div class="entryBar"></div>
        </div>
      </div>
      <div class="content">
        <div class="topRow">
          <div class="panel panelA" id="panelA">
            <iframe
              id="frameA"
              class="panel-iframe"
              title="module2-panelA"
              src=""
              style="display:none"
            ></iframe>
            <div class="placeholder" id="phA">图A占位</div>
          </div>
          <div class="panel panelB" id="panelB">
            <iframe
              id="frameB"
              class="panel-iframe"
              title="module2-panelB"
              src=""
              style="display:none"
            ></iframe>
            <div class="placeholder" id="phB">图B占位</div>
          </div>
        </div>

        <div class="bottomRow">
          <div class="panel fanWrap" id="fanWrap">
            <svg
              class="fanSwitch"
              id="fanSwitch"
              viewBox="-4 -4 408 408"
              preserveAspectRatio="xMinYMax meet"
              aria-label="模块二构件切换器"
            >
              <defs>
                <clipPath id="clip-tj" clipPathUnits="userSpaceOnUse">
                  <path id="clippath-tj" d=""></path>
                </clipPath>
                <clipPath id="clip-fq" clipPathUnits="userSpaceOnUse">
                  <path id="clippath-fq" d=""></path>
                </clipPath>
                <clipPath id="clip-mtq" clipPathUnits="userSpaceOnUse">
                  <path id="clippath-mtq" d=""></path>
                </clipPath>
                <clipPath id="clip-wd" clipPathUnits="userSpaceOnUse">
                  <path id="clippath-wd" d=""></path>
                </clipPath>
              </defs>

              <!-- 扇形分区图像填充：用 path 作为 clip 形状 -->
              <image
                href="/charts/module2-fan-images/tj.jpeg"
                class="fan-img"
                data-key="tj"
                x="-4"
                y="-4"
                width="408"
                height="408"
                preserveAspectRatio="xMidYMid slice"
                clip-path="url(#clip-tj)"
                style="pointer-events:none; opacity:0.98;"
              />
              <image
                href="/charts/module2-fan-images/fq.jpg"
                class="fan-img"
                data-key="fq"
                x="-4"
                y="-4"
                width="408"
                height="408"
                preserveAspectRatio="xMidYMid slice"
                clip-path="url(#clip-fq)"
                style="pointer-events:none; opacity:0.98;"
              />
              <image
                href="/charts/module2-fan-images/mtq.jpg"
                class="fan-img"
                data-key="mtq"
                x="-4"
                y="-4"
                width="408"
                height="408"
                preserveAspectRatio="xMidYMid slice"
                clip-path="url(#clip-mtq)"
                style="pointer-events:none; opacity:0.98;"
              />
              <image
                href="/charts/module2-fan-images/wd.jpg"
                class="fan-img"
                data-key="wd"
                x="-4"
                y="-4"
                width="408"
                height="408"
                preserveAspectRatio="xMidYMid slice"
                clip-path="url(#clip-wd)"
                style="pointer-events:none; opacity:0.98;"
              />

              <path id="seg-tj" class="fan-path" data-key="tj" d=""></path>
              <text class="fan-label" data-key="tj" text-anchor="middle">天井</text>

              <path id="seg-fq" class="fan-path" data-key="fq" d=""></path>
              <text class="fan-label" data-key="fq" text-anchor="middle">粉墙</text>

              <path id="seg-mtq" class="fan-path" data-key="mtq" d=""></path>
              <text class="fan-label" data-key="mtq" text-anchor="middle">马头墙</text>

              <path id="seg-wd" class="fan-path" data-key="wd" d=""></path>
              <text class="fan-label" data-key="wd" text-anchor="middle">屋顶</text>
            </svg>
          </div>

          <div class="panel panelC" id="panelC">
            <iframe
              id="frameC"
              class="panel-iframe"
              title="module2-panelC"
              src=""
              style="display:none"
            ></iframe>
            <div class="placeholder" id="phC">词云C占位</div>
          </div>

          <div class="panel panelD" id="panelD">
            <iframe
              id="frameD"
              class="panel-iframe"
              title="module2-panelD"
              src=""
              style="display:none"
            ></iframe>
            <div class="placeholder" id="phD">图D占位</div>
          </div>
        </div>
      </div>
    </div>

    <script>
      (function () {
        const fanSwitch = document.getElementById('fanSwitch')
        const pageEl = document.querySelector('.page')
        const entryMask = document.getElementById('entryMask')
        const fanWrapEl = document.getElementById('fanWrap')
        const frameA = document.getElementById('frameA')
        const frameB = document.getElementById('frameB')
        const frameC = document.getElementById('frameC')
        const frameD = document.getElementById('frameD')
        const phA = document.getElementById('phA')
        const phB = document.getElementById('phB')
        const phC = document.getElementById('phC')
        const phD = document.getElementById('phD')

        const names = { tj: '天井', fq: '粉墙', mtq: '马头墙', wd: '屋顶' }
        const KEYS = ['tj', 'fq', 'mtq', 'wd']
        const ACTIVE_DEG = 34
        const NORMAL_DEG = (90 - ACTIVE_DEG) / 3
        const segEls = {}
        const labelEls = {}
        const clipPathEls = {}
        const imgEls = {}
        const panelCEl = document.getElementById('panelC')
        const panelDEl = document.getElementById('panelD')
        const panels = Array.from(document.querySelectorAll('.panel'))

        const keyAccent = {
          tj: 'rgba(106, 127, 149, 0.55)',
          fq: 'rgba(143, 122, 107, 0.55)',
          mtq: 'rgba(151, 108, 92, 0.58)',
          wd: 'rgba(173, 139, 87, 0.55)'
        }

        let hoveredKey = null

        KEYS.forEach((k) => {
          segEls[k] = fanSwitch.querySelector(`.fan-path[data-key="${k}"]`)
          labelEls[k] = fanSwitch.querySelector(`.fan-label[data-key="${k}"]`)
          clipPathEls[k] = fanSwitch.querySelector(`#clippath-${k}`)
          imgEls[k] = fanSwitch.querySelector(`image.fan-img[data-key="${k}"]`)
        })

        panels.forEach((p, idx) => {
          p.style.transitionDelay = `${80 + idx * 55}ms`
        })

        const R = 400
        const CX = 0
        const CY = 400
        const LABEL_R = 270

        const degToRad = (d) => d * Math.PI / 180

        function fanPath(startDeg, endDeg) {
          const s = degToRad(startDeg)
          const e = degToRad(endDeg)
          const x1 = CX + R * Math.cos(s)
          const y1 = CY - R * Math.sin(s)
          const x2 = CX + R * Math.cos(e)
          const y2 = CY - R * Math.sin(e)
          return `M${CX},${CY} L${x1.toFixed(1)},${y1.toFixed(1)} A${R},${R} 0 0,0 ${x2.toFixed(1)},${y2.toFixed(1)} Z`
        }

        function labelPos(midDeg) {
          const r = degToRad(midDeg)
          return { x: CX + LABEL_R * Math.cos(r), y: CY - LABEL_R * Math.sin(r) }
        }

        function computeAngles(activeKey) {
          return KEYS.map(k => (k === activeKey ? ACTIVE_DEG : NORMAL_DEG))
        }

        function setFanByAngles(angles, activeKey) {
          let cursor = 0
          KEYS.forEach((k, i) => {
            const seg = segEls[k]
            const lbl = labelEls[k]
            const clipEl = clipPathEls[k]
            const start = cursor
            const end = cursor + angles[i]
            cursor = end

            if (seg) {
              const d = fanPath(start, end)
              seg.setAttribute('d', d)
              seg.classList.toggle('active', k === activeKey)
              seg.classList.toggle('hover', hoveredKey === k && k !== activeKey)
            }
            if (clipEl) {
              clipEl.setAttribute('d', fanPath(start, end))
            }

            if (lbl) {
              const mid = (start + end) / 2
              const pos = labelPos(mid)
              lbl.setAttribute('x', pos.x.toFixed(1))
              lbl.setAttribute('y', pos.y.toFixed(1))
              lbl.classList.toggle('active', k === activeKey)
            }

            const img = imgEls[k]
            if (img) {
              const opacity = (k === activeKey) ? 1 : (hoveredKey === k ? 0.85 : 0.55)
              img.style.opacity = opacity
            }
          })
        }

        function render(key) {
          const name = names[key] || key

          function applyUnifiedChartStyle(frameEl) {
            if (!frameEl) return
            const doc = frameEl.contentDocument
            if (!doc) return
            if (doc.getElementById('m2-unified-title-style')) return
            const style = doc.createElement('style')
            style.id = 'm2-unified-title-style'
            style.textContent = `
              html, body {
                background: #f4efe6 !important;
              }
              .wrap,
              .dashboard,
              .container,
              .page {
                background: transparent !important;
              }
              .subtitle,
              .header .subtitle,
              #chartSubtitle,
              .subhead,
              [class*="subtitle-en"] {
                display: none !important;
              }
              .header,
              .headerRow {
                margin-bottom: 10px !important;
                background: #efe8dc !important;
                border: 1px solid #d8cfbf !important;
                border-radius: 12px !important;
                padding: 8px 12px 8px 14px !important;
                box-shadow: none !important;
              }
              .title,
              .header h1 {
                margin-bottom: 0 !important;
                font-family: Georgia, "KaiTi", "楷体", "华文楷体", STKaiti, serif !important;
                font-weight: 700 !important;
                letter-spacing: 1px !important;
                color: #3b342b !important;
                font-size: 22px !important;
                line-height: 1.25 !important;
              }
              .header::before {
                left: 0 !important;
                top: 3px !important;
                bottom: 3px !important;
                width: 4px !important;
                background: #6c7a89 !important;
              }
              .wrap {
                padding-top: 14px !important;
                background: #f4efe6 !important;
              }
              .content,
              .main,
              .chartArea {
                background: #f4efe6 !important;
              }
              .chart-wrapper,
              .chart-wrap,
              .chartInner,
              .chart-container,
              #chart-container,
              #chart,
              #fullHeatMatrix {
                height: 100% !important;
                min-height: 0 !important;
                background: #f4efe6 !important;
              }
            `
            doc.head.appendChild(style)
          }

          function mountFrame(frameEl, url, visible) {
            if (!frameEl) return
            if (!visible) {
              frameEl.style.display = 'none'
              frameEl.classList.remove('ready')
              frameEl.removeAttribute('src')
              return
            }
            const oldSrc = frameEl.getAttribute('src') || ''
            if (oldSrc !== url) {
              frameEl.classList.remove('ready')
              frameEl.setAttribute('src', url)
            }
            frameEl.style.display = 'block'
            applyUnifiedChartStyle(frameEl)
            // fallback，避免个别浏览器 load 事件慢触发导致白屏突兀
            setTimeout(() => {
              frameEl.classList.add('ready')
              applyUnifiedChartStyle(frameEl)
            }, 260)
          }

          // panelA：各构件 A 图
          const panelAVisible = key === 'mtq' || key === 'fq' || key === 'wd' || key === 'tj'
          const panelAUrl = key === 'mtq'
            ? '/charts/module2-mtq-a-heatmap.html'
            : (key === 'fq'
              ? '/charts/module2-fq-a-radial.html'
              : (key === 'tj'
                ? '/charts/module2-tj-a-heatmap.html'
                : '/charts/module2-wd-a-rose.html'))
          mountFrame(frameA, panelAUrl, panelAVisible)
          if (phA) {
            phA.style.display = panelAVisible ? 'none' : 'flex'
          }

          // panelB：各构件关系图
          const panelBVisible = key === 'mtq' || key === 'fq' || key === 'wd' || key === 'tj'
          const panelBUrl = key === 'mtq'
            ? '/charts/module2-mtq-b-relationship.html'
            : (key === 'fq'
              ? '/charts/module2-fq-b-relationship.html'
              : (key === 'tj'
                ? '/charts/module2-tj-b-relationship.html'
                : '/charts/module2-wd-b-relationship.html'))
          mountFrame(frameB, panelBUrl, panelBVisible)
          if (phB) {
            phB.style.display = panelBVisible ? 'none' : 'flex'
          }

          // panelC：各构件词云
          const panelCVisible = key === 'mtq' || key === 'fq' || key === 'wd' || key === 'tj'
          const panelCUrl = key === 'mtq'
            ? '/charts/module2-mtq-c-wordcloud.html'
            : (key === 'fq'
              ? '/charts/module2-fq-c-wordcloud.html'
              : (key === 'tj'
                ? '/charts/module2-tj-c-wordcloud.html'
                : '/charts/module2-wd-c-wordcloud.html'))
          mountFrame(frameC, panelCUrl, panelCVisible)
          if (phC) {
            phC.style.display = panelCVisible ? 'none' : 'flex'
          }

          // panelD：各构件 D 图
          const panelDVisible = key === 'mtq' || key === 'fq' || key === 'wd' || key === 'tj'
          const panelDUrl = key === 'mtq'
            ? '/charts/module2-mtq-d-summary.html'
            : (key === 'fq'
              ? '/charts/module2-fq-d-structure.html'
              : (key === 'tj'
                ? '/charts/module2-tj-d-thermal.html'
                : '/charts/module2-wd-d-radar.html'))
          mountFrame(frameD, panelDUrl, panelDVisible)
          if (phD) {
            phD.style.display = panelDVisible ? 'none' : 'flex'
          }

          ;[phA, phB, phC, phD].forEach((el) => {
            if (!el) return
            el.style.opacity = '0'
            el.style.transform = 'translateY(6px)'
          })

          requestAnimationFrame(() => {
            phA.textContent = `图A占位：${name}`
            phB.textContent = `图B占位：${name}`
            phC.textContent = `词云C占位：${name}`
            phD.textContent = `图D占位：${name}`
            ;[phA, phB, phC, phD].forEach((el) => {
              if (!el) return
              el.style.opacity = '1'
              el.style.transform = 'translateY(0)'
            })
          })

          if (panelCEl && panelDEl && keyAccent[key]) {
            panelCEl.style.borderColor = keyAccent[key]
            panelDEl.style.borderColor = keyAccent[key]
          }
        }

        let currentKey = 'mtq'
        let currentAngles = computeAngles(currentKey)
        setFanByAngles(currentAngles, currentKey)
        render(currentKey)

        ;[frameA, frameB, frameC, frameD].forEach((f) => {
          if (!f) return
          f.addEventListener('load', () => {
            f.classList.add('ready')
            const doc = f.contentDocument
            if (!doc || doc.getElementById('m2-unified-title-style')) return
            const style = doc.createElement('style')
            style.id = 'm2-unified-title-style'
            style.textContent = `
              html, body {
                background: #f4efe6 !important;
              }
              .wrap,
              .dashboard,
              .container,
              .page {
                background: transparent !important;
              }
              .subtitle,
              .header .subtitle,
              #chartSubtitle,
              .subhead,
              [class*="subtitle-en"] {
                display: none !important;
              }
              .header,
              .headerRow {
                margin-bottom: 10px !important;
                background: #efe8dc !important;
                border: 1px solid #d8cfbf !important;
                border-radius: 12px !important;
                padding: 8px 12px 8px 14px !important;
                box-shadow: none !important;
              }
              .title,
              .header h1 {
                margin-bottom: 0 !important;
                font-family: Georgia, "KaiTi", "楷体", "华文楷体", STKaiti, serif !important;
                font-weight: 700 !important;
                letter-spacing: 1px !important;
                color: #3b342b !important;
                font-size: 22px !important;
                line-height: 1.25 !important;
              }
              .header::before {
                left: 0 !important;
                top: 3px !important;
                bottom: 3px !important;
                width: 4px !important;
                background: #6c7a89 !important;
              }
              .wrap {
                padding-top: 14px !important;
                background: #f4efe6 !important;
              }
              .content,
              .main,
              .chartArea {
                background: #f4efe6 !important;
              }
              .chart-wrapper,
              .chart-wrap,
              .chartInner,
              .chart-container,
              #chart-container,
              #chart,
              #fullHeatMatrix {
                height: 100% !important;
                min-height: 0 !important;
                background: #f4efe6 !important;
              }
            `
            doc.head.appendChild(style)
          })
        })

        function preloadImages(urls) {
          return Promise.allSettled(
            urls.map((url) => new Promise((resolve) => {
              const img = new Image()
              img.onload = () => resolve(true)
              img.onerror = () => resolve(false)
              img.src = url
            }))
          )
        }

        async function runEntryAnimation() {
          const urls = [
            '/charts/module2-fan-images/tj.jpeg',
            '/charts/module2-fan-images/fq.jpg',
            '/charts/module2-fan-images/mtq.jpg',
            '/charts/module2-fan-images/wd.jpg'
          ]
          await Promise.race([
            preloadImages(urls),
            new Promise((resolve) => setTimeout(resolve, 1200))
          ])
          if (fanWrapEl) fanWrapEl.classList.add('images-ready')
          requestAnimationFrame(() => {
            if (pageEl) pageEl.classList.add('ready')
          })
          setTimeout(() => {
            if (entryMask) entryMask.classList.add('hide')
          }, 140)
        }

        runEntryAnimation()

        let animRaf = 0
        let isAnimating = false

        function easeOutCubic(t) {
          return 1 - Math.pow(1 - t, 3)
        }

        function animateTo(newKey) {
          if (!newKey || newKey === currentKey) return
          if (isAnimating && animRaf) cancelAnimationFrame(animRaf)

          const fromAngles = currentAngles.slice()
          const toAngles = computeAngles(newKey)

          const duration = 360
          const start = performance.now()

          isAnimating = true
          currentKey = newKey
          // 文案/占位先切，图形再做动画过渡
          render(newKey)

          const tick = (now) => {
            const t = Math.min(1, (now - start) / duration)
            const e = easeOutCubic(t)

            const angles = fromAngles.map((a, i) => a + (toAngles[i] - a) * e)
            setFanByAngles(angles, newKey)

            if (t < 1) {
              animRaf = requestAnimationFrame(tick)
            } else {
              currentAngles = toAngles
              setFanByAngles(currentAngles, currentKey)
              isAnimating = false
            }
          }

          animRaf = requestAnimationFrame(tick)
        }

        // 点击监听：让扇形“扩大道具”更丝滑
        Object.keys(segEls).forEach((k) => {
          const seg = segEls[k]
          if (!seg) return
          seg.addEventListener('click', () => animateTo(seg.dataset.key))
          seg.addEventListener('mouseenter', () => {
            hoveredKey = k
            setFanByAngles(currentAngles, currentKey)
          })
          seg.addEventListener('mouseleave', () => {
            hoveredKey = null
            setFanByAngles(currentAngles, currentKey)
          })
        })

        window.addEventListener('resize', () => {
          setFanByAngles(currentAngles, currentKey)
        })
      })()
    </script>
  </body>
</html>
